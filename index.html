            <span className="font-bold text-neutral-300 flex items-center gap-2"><Layers size={14} className="text-neutral-500" /> Deck: {deck.length}</span>
            {relics.length > 0 && <><span className="text-neutral-700">|</span><span className="font-bold text-blue-400">{relics.length} Relic{relics.length > 1 ? 's' : ''}</span></>}
            {consumables.length > 0 && <><span className="text-neutral-700">|</span><span className="font-bold text-amber-400">{consumables.length} Consumable{consumables.length > 1 ? 's' : ''}</span></>}
          </div>

          {/* Equipped relics row */}
          {relics.length > 0 && (
            <div className="flex flex-wrap gap-2 mb-4">
              {relics.map((rId) => {
                const r = RELIC_POOL.find((x) => x.id === rId);
                if (!r) return null;
                return (
                  <div key={rId} title={r.desc} className="bg-blue-950/30 border border-blue-900/50 rounded-lg px-2 py-1 flex items-center gap-1.5">
                    <r.icon size={12} className="text-blue-400" />
                    <span className="text-[11px] font-bold text-blue-300">{r.name}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Consumable shelf */}
          {consumables.length > 0 && (
            <div className="mb-4 bg-amber-950/10 border border-amber-900/40 rounded-xl p-3">
              <div className="text-[10px] font-bold uppercase tracking-widest text-amber-500 mb-2">Consumables (tap to queue for next file):</div>
              <div className="flex flex-wrap gap-2">
                {consumables.map((c, i) => (
                  <button key={i} onClick={() => queueConsumable(c, i)} className="bg-neutral-950 hover:bg-amber-950/40 border border-amber-900/40 rounded-lg px-2 py-1 flex items-center gap-1.5 transition-colors" title={c.desc}>
                    <c.icon size={12} className="text-amber-400" />
                    <span className="text-[11px] font-bold text-amber-300">{c.name}</span>
                  </button>
                ))}
              </div>
            </div>
          )}

          {pendingConsumables.length > 0 && (
            <div className="mb-4 bg-emerald-950/10 border border-emerald-900/40 rounded-xl p-3">
              <div className="text-[10px] font-bold uppercase tracking-widest text-emerald-500 mb-2">Will trigger on next file:</div>
              <div className="flex flex-wrap gap-2">
                {pendingConsumables.map((c, i) => (
                  <div key={i} className="bg-neutral-950 border border-emerald-900/40 rounded-lg px-2 py-1 flex items-center gap-1.5">
                    <c.icon size={12} className="text-emerald-400" />
                    <span className="text-[11px] font-bold text-emerald-300">{c.name}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="flex flex-col gap-3">
            {scamFileAvailable && (
              <button onClick={() => { setScamFileAvailable(false); startEncounter(generateScamFile(day, clearedDeals)); }}
                className="w-full py-4 bg-gradient-to-r from-red-700 to-amber-700 hover:from-red-600 hover:to-amber-600 text-white font-black rounded-xl transition-all shadow-lg shadow-red-900/40 uppercase tracking-widest flex justify-between items-center px-6 border border-amber-300/40">
                <span className="flex items-center gap-2">
                  <AlertTriangle size={18} /> Investigate Suspicious File
                </span>
                <span className="text-[10px] font-mono tracking-normal text-amber-100/90 normal-case">+$500 · rare card</span>
              </button>
            )}
            <button onClick={() => startEncounter()} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-xl transition-all shadow-lg shadow-emerald-900/20 uppercase tracking-widest flex justify-between items-center px-6">
              <span>Next File</span> <ChevronRight size={20} />
            </button>
            <button onClick={generateShop} className="w-full py-4 bg-neutral-800 hover:bg-neutral-700 text-amber-400 font-bold border border-neutral-700 rounded-xl transition-all uppercase tracking-widest flex justify-between items-center px-6">
              <span>Hit Broker Row</span> <Store size={20} />
            </button>
            <button onClick={() => setShowHelp(true)} className="w-full py-2 text-neutral-500 hover:text-white font-bold transition-colors uppercase tracking-widest text-xs flex items-center justify-center gap-2">
              <BookOpen size={14} /> How to Play
            </button>
          </div>
        </div>
        {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
        {globalAudioControlJsx}
      </div>
    );
  }

  if (gameState === 'SHOP') {
    const cardRemoveCost = removalCost(day);
    const refreshPrice = refreshCost(day) + refreshUsed * 25;
    const priceMultLabel = `${Math.round(priceMultiplier(day) * 100)}%`;
    return (
      <div className="min-h-screen bg-neutral-950 p-4 sm:p-6 font-sans text-neutral-200">
        <div className="max-w-4xl mx-auto">
          <div className="flex justify-between items-center mb-4 border-b border-neutral-800 pb-4">
            <div>
              <h1 className="text-2xl sm:text-3xl font-black text-white uppercase flex items-center gap-3">
                <Store className="text-amber-500" /> Broker Row
              </h1>
              <div className="text-[10px] uppercase font-bold tracking-widest text-neutral-500 mt-1">
                Prices at {priceMultLabel} of base · Day {day}
              </div>
            </div>
            <div className="text-right">
              <div className="text-[10px] uppercase font-bold tracking-widest text-neutral-500">Commission</div>
              <div className="text-xl sm:text-2xl font-mono font-bold text-amber-400">{formatMoney(commission)}</div>
            </div>
          </div>

          {shopkeeper && (
            <div className="mb-6 bg-neutral-900 border border-neutral-800 rounded-2xl p-4 flex items-start gap-4">
              <div className="w-12 h-12 rounded-full bg-neutral-950 border border-neutral-700 flex items-center justify-center shrink-0">
                <Phone size={20} className={shopkeeper.accent} />
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-[10px] uppercase font-bold tracking-widest text-neutral-500">{shopkeeper.title}</div>
                <div className={`text-base font-black ${shopkeeper.accent} truncate`}>{shopkeeper.name}</div>
                <div className="text-xs text-neutral-300 italic mt-1">"{shopkeeper.line}"</div>
              </div>
            </div>
          )}

          <button onClick={refreshShop} disabled={commission < refreshPrice}
            className="mb-4 px-4 py-2 bg-neutral-800 hover:bg-neutral-700 border border-neutral-700 rounded-lg text-xs uppercase tracking-widest font-bold text-neutral-300 disabled:opacity-40 flex items-center gap-2">
            <RefreshCw size={12} /> Walk to a New Floor ({formatMoney(refreshPrice)})
          </button>

          <div className="grid md:grid-cols-2 gap-6 mb-6">
            {/* ISO Contacts (relics) */}
            <div>
              <h2 className="text-xs uppercase font-black tracking-widest text-blue-400 mb-3 flex items-center gap-2"><Award size={14} /> ISO Contacts — Permanent</h2>
              <div className="space-y-2">
                {shopRelics.map((r) => {
                  const cost = Math.floor(r.cost * priceMultiplier(day));
                  const owned = relics.includes(r.id);
                  return (
                    <button key={r.id} onClick={() => buyRelic(r)} disabled={owned || commission < cost}
                      className="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-3 flex items-center gap-3 hover:border-blue-700 disabled:opacity-40 disabled:hover:border-neutral-800 transition-colors text-left">
                      <div className="w-10 h-10 rounded-full bg-blue-950/50 border border-blue-900/50 flex items-center justify-center shrink-0">
                        <r.icon size={18} className="text-blue-400" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="font-bold text-sm text-white">{r.name}</div>
                        <div className="text-[11px] text-neutral-400 leading-tight">{r.desc}</div>
                      </div>
                      <div className="text-right shrink-0">
                        <div className="text-amber-400 font-mono font-bold text-sm">{formatMoney(cost)}</div>
                        <div className="text-[9px] uppercase tracking-widest text-neutral-600">Permanent</div>
                      </div>
                    </button>
                  );
                })}
                {shopRelics.length === 0 && <div className="text-neutral-600 text-xs italic">No more contacts to plug today.</div>}
              </div>
            </div>

            {/* Hot Tips (consumables) */}
            <div>
              <h2 className="text-xs uppercase font-black tracking-widest text-amber-400 mb-3 flex items-center gap-2"><FlaskConical size={14} /> Hot Tips — One-Use</h2>
              <div className="space-y-2">
                {shopConsumables.map((c, i) => {
                  const cost = Math.floor(c.cost * priceMultiplier(day));
                  return (
                    <button key={i} onClick={() => buyConsumable(c)} disabled={commission < cost}
                      className="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-3 flex items-center gap-3 hover:border-amber-700 disabled:opacity-40 disabled:hover:border-neutral-800 transition-colors text-left">
                      <div className="w-10 h-10 rounded-full bg-amber-950/50 border border-amber-900/50 flex items-center justify-center shrink-0">
                        <c.icon size={18} className="text-amber-400" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="font-bold text-sm text-white">{c.name}</div>
                        <div className="text-[11px] text-neutral-400 leading-tight">{c.desc}</div>
                      </div>
                      <div className="text-right shrink-0">
                        <div className="text-amber-400 font-mono font-bold text-sm">{formatMoney(cost)}</div>
                        <div className="text-[9px] uppercase tracking-widest text-neutral-600">One-Use</div>
                      </div>
                    </button>
                  );
                })}
                {shopConsumables.length === 0 && <div className="text-neutral-600 text-xs italic">Phones are quiet right now.</div>}
              </div>
            </div>
          </div>

          {/* Drop a Position (deck removal) */}
          <div className="bg-neutral-900 border border-neutral-800 rounded-2xl p-4 mb-6">
            <h2 className="text-xs uppercase font-black tracking-widest text-red-400 mb-3 flex items-center gap-2"><X size={14} /> Drop a Position — {formatMoney(cardRemoveCost)}</h2>
            <div className="text-[11px] text-neutral-500 mb-3">Pay an ISO to walk a card off your book. Frees up the slot. Minimum deck size 3.</div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
              {deck.map((card) => (
                <div key={card.uid} className={`p-2 rounded-lg border ${card.color} flex items-center justify-between gap-2`}>
                  <div className="flex items-center gap-2 min-w-0">
                    <card.icon size={12} className="shrink-0" />
                    <span className="text-[11px] font-bold uppercase truncate">{card.name}</span>
                  </div>
                  <button onClick={() => removeFromDeck(card.uid)}
                    disabled={commission < cardRemoveCost || deck.length <= 3}
                    className="text-[10px] uppercase font-bold text-red-400 hover:text-red-300 disabled:text-neutral-600 shrink-0">
                    Drop
                  </button>
                </div>
              ))}
            </div>
          </div>

          <button onClick={() => setGameState('INTERMISSION')} className="px-6 py-3 font-bold text-neutral-400 hover:text-white transition-colors flex items-center gap-2">
            Step Off the Floor <ChevronRight size={16} />
          </button>
        </div>
        {globalAudioControlJsx}
      </div>
    );
  }

  if (gameState === 'DRAFT') {
    return (
      <div className="min-h-screen bg-neutral-950 flex flex-col items-center justify-center p-4 sm:p-6 text-neutral-200">
        <div className="max-w-4xl w-full">
          <h2 className="text-xl sm:text-2xl font-black text-white uppercase tracking-widest text-center mb-8">Draft a Card</h2>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-6 mb-8">
            {draftChoices.map((card, i) => (
              <button key={i} onClick={() => draftCard(card)}
                className={`min-h-[16rem] rounded-2xl border flex flex-col items-center justify-center p-6 text-center transition-all transform hover:-translate-y-2 hover:shadow-xl group ${card.color}`}>
                <card.icon size={32} className="mb-4 opacity-80 group-hover:opacity-100 transition-opacity" />
                <h3 className="font-black text-lg uppercase tracking-widest mb-2">{card.name}</h3>
                <p className="text-xs opacity-80 font-mono mb-3">{card.desc}</p>
                <p className="text-[10px] opacity-60 leading-snug mb-4">{card.tooltip}</p>
                <div className="mt-auto inline-flex items-center gap-1 bg-black/30 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">
                  <Zap size={10} /> {card.energy} Cost
                </div>
              </button>
            ))}
          </div>
          <div className="text-center">
            <button onClick={() => draftCard(null)} className="px-8 py-3 text-neutral-500 font-bold hover:text-white transition-colors uppercase tracking-widest text-sm">
              Skip Draft
            </button>
          </div>
        </div>
        {globalAudioControlJsx}
      </div>
    );
  }

  if (gameState === 'GAMEOVER') {
    const won = capital > 0 && day >= PROMOTION_DAY;
    return (
      <div className="min-h-screen bg-neutral-950 flex flex-col items-center justify-center p-6 text-neutral-200">
        <div className={`max-w-md w-full bg-neutral-900 rounded-3xl p-8 border ${won ? 'border-emerald-700' : 'border-red-900/50'} text-center shadow-2xl`}>
          {won ? <Trophy className="w-20 h-20 mx-auto text-emerald-500 mb-4" /> : <AlertTriangle className="w-20 h-20 mx-auto text-red-500 mb-4" />}
          <h1 className={`text-3xl font-black uppercase tracking-tight mb-2 ${won ? 'text-emerald-400' : 'text-red-500'}`}>
            {won ? 'Promoted to VP' : 'Fund Wiped'}
          </h1>
          <p className="text-neutral-400 mb-2">
            {won ? `Survived ${PROMOTION_DAY} days. Final fund: ${formatMoney(capital)}` : `The desk closed on Day ${day}. Capital ran out.`}
          </p>
          <p className="text-neutral-500 text-sm mb-6">Commission earned: {formatMoney(commission)}</p>
          <button onClick={() => { setGameState('MENU'); }} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-xl uppercase tracking-widest">
            Play Again
          </button>
        </div>
        {globalAudioControlJsx}
      </div>
    );
  }

  // === RESOLUTION_REVEAL screen (Fix F1) ===========================================
  // Sits between Submit and the calm RESOLUTION aftermath screen. Renders the locked
  // file panel + locked term sheet + Risk Meter + Card Cascade overlay. Click anywhere
  // to skip to the settled state. Retires symptoms 2 / 3 / 18.
  if (gameState === 'RESOLUTION_REVEAL') {
    const currentEvent = revealQueue[revealStep];
    const landEvent = revealQueue.find((e) => e.type === 'land');
    const lockEvent = revealQueue.find((e) => e.type === 'lock');
    const threshold = landEvent?.payload.threshold ?? (boss?.riskThreshold ?? 35);
    const meterMax = 120; // risk is clamped 0–120 in executeOffer
    const thresholdPct = (threshold / meterMax) * 100;
    const stressedPct = Math.min(100, ((threshold + 15) / meterMax) * 100);
    const breachPct = Math.min(100, ((threshold + 30) / meterMax) * 100);
    const collapsePct = Math.min(100, ((threshold + 50) / meterMax) * 100);
    const needlePct = Math.min(100, (revealRiskNow / meterMax) * 100);
    const isLanded = currentEvent?.type === 'land' || revealDone;
    const bandTone = landEvent?.payload.bandTone || 'neutral';
    const toneClass = bandTone === 'emerald' ? 'text-emerald-400'
      : bandTone === 'amber' ? 'text-amber-400'
      : bandTone === 'red' ? 'text-red-400' : 'text-neutral-300';
    const skip = () => {
      if (revealDone) {
        finalizeReveal();
        return;
      }
      setRevealSkipped(true);
    };

    return (
      <div onClick={skip} className="min-h-screen bg-neutral-950 text-neutral-200 font-sans flex flex-col cursor-pointer select-none">
        {/* Screen flash overlay — keyed by revealFlashTrigger to retrigger animation on land */}
        {revealFlashTrigger > 0 && (
          <div key={revealFlashTrigger} className="fixed inset-0 bg-white reveal-screen-flash z-50" />
        )}
        <div className={isLanded ? 'reveal-wrapper-shake flex-1 flex flex-col' : 'flex-1 flex flex-col'}>
          {/* Locked file header — same shape as encounter HUD, but read-only */}
          <header className="px-4 sm:px-6 py-3 flex justify-between items-center border-b border-neutral-800 bg-neutral-900/50">
            <div>
              <div className="text-[10px] uppercase font-bold tracking-widest text-neutral-500">Submitted</div>
              <div className="text-sm sm:text-base font-black text-white">{boss?.merchantName || boss?.industry?.name || 'Merchant File'}</div>
            </div>
            <div className="text-right">
              <div className="text-[10px] uppercase font-bold tracking-widest text-neutral-500">Day {day}</div>
              <div className="text-xs text-neutral-500 italic">{revealDone ? 'Tap to continue' : 'Tap to skip'}</div>
            </div>
          </header>

          <div className="flex-1 flex flex-col justify-center items-center px-4 sm:px-8 py-6 max-w-3xl mx-auto w-full">
            {/* Risk Meter — horizontal bar, 4 marked thresholds, animated needle */}
            <div className="w-full mb-6">
              <div className="flex items-baseline justify-between mb-2">
                <div className="text-[10px] uppercase font-bold tracking-widest text-neutral-500">Risk vs Threshold</div>
                <div className={`text-3xl font-black font-mono ${isLanded ? toneClass : 'text-neutral-300'} transition-colors duration-300`}>
                  {Math.round(revealRiskNow)}
                </div>
              </div>
              <div className={`relative w-full h-8 rounded-lg border border-neutral-800 overflow-hidden ${isLanded ? 'reveal-meter-pulse' : ''}`}
                   style={{ background: `linear-gradient(to right,
                     rgb(16,185,129) 0%, rgb(16,185,129) ${thresholdPct}%,
                     rgb(245,158,11) ${thresholdPct}%, rgb(245,158,11) ${stressedPct}%,
                     rgb(239,68,68) ${stressedPct}%, rgb(239,68,68) ${breachPct}%,
                     rgb(153,27,27) ${breachPct}%, rgb(153,27,27) ${collapsePct}%,
                     rgb(69,10,10) ${collapsePct}%, rgb(69,10,10) 100%)`,
                     opacity: 0.55 }}>
                {/* Threshold tick — vertical line at the file's clean-clear cutoff */}
                <div className="absolute top-0 bottom-0 w-px bg-white/60" style={{ left: `${thresholdPct}%` }} />
                {/* Needle — animates left position via CSS transition */}
                <div className={`absolute top-0 bottom-0 w-1 bg-white risk-needle ${isLanded ? 'reveal-needle-settle' : ''}`}
                     style={{ left: `${needlePct}%`, transform: 'translateX(-50%)', boxShadow: '0 0 8px rgba(255,255,255,0.6)' }} />
              </div>
              <div className="flex justify-between text-[9px] uppercase tracking-widest text-neutral-600 mt-1.5 font-bold">
                <span>Clear</span>
                <span style={{ marginLeft: `${thresholdPct - 4}%` }}>· Threshold {threshold} ·</span>
                <span>Collapse</span>
              </div>
            </div>

            {/* Card Cascade — current event display. One element at a time. */}
            <div className="w-full min-h-[7rem] flex items-center justify-center">
              {currentEvent && currentEvent.type === 'lock' && (
                <div key={`step-${revealStep}`} className="reveal-card-enter bg-neutral-900 border border-neutral-700 rounded-2xl px-6 py-4 text-center">
                  <div className="text-[10px] uppercase font-bold tracking-widest text-neutral-500 mb-1">Term Sheet Locked</div>
                  <div className="text-base text-neutral-300">Base contribution from your offer terms</div>
                  <div className="font-mono text-2xl font-black mt-2 text-neutral-200">
                    {currentEvent.payload.sliderRisk >= 0 ? '+' : ''}{currentEvent.payload.sliderRisk} <span className="text-xs text-neutral-500">Risk</span>
                  </div>
                </div>
              )}
              {currentEvent && currentEvent.type === 'card' && (
                <div key={`step-${revealStep}`} className="reveal-card-enter bg-neutral-900 border border-neutral-700 rounded-2xl px-6 py-4 text-center min-w-[14rem]">
                  <div className="text-[10px] uppercase font-bold tracking-widest text-neutral-500 mb-1">Card Played</div>
                  <div className="text-base font-black text-white">{currentEvent.payload.name}</div>
                  <div className="font-mono text-xl font-black mt-2 flex justify-center gap-3">
                    {Math.abs(currentEvent.payload.risk) > 0.5 && (
                      <span className={currentEvent.payload.risk < 0 ? 'text-emerald-400' : 'text-red-400'}>
                        {currentEvent.payload.risk > 0 ? '+' : ''}{Math.round(currentEvent.payload.risk)} <span className="text-[10px] text-neutral-500">Risk</span>
                      </span>
                    )}
                    {Math.abs(currentEvent.payload.factor) > 0.005 && (
                      <span className={currentEvent.payload.factor > 0 ? 'text-amber-400' : 'text-cyan-400'}>
                        {currentEvent.payload.factor > 0 ? '+' : ''}{currentEvent.payload.factor.toFixed(2)} <span className="text-[10px] text-neutral-500">Factor</span>
                      </span>
                    )}
                  </div>
                </div>
              )}
              {currentEvent && currentEvent.type === 'anomaly' && (
                <div key={`step-${revealStep}`} className={`reveal-card-enter reveal-shake border rounded-2xl px-6 py-4 text-center min-w-[14rem] ${currentEvent.payload.wasHidden ? 'bg-red-950/40 border-red-700/60' : 'bg-neutral-900 border-amber-700/50'}`}>
                  <div className={`text-[10px] uppercase font-bold tracking-widest mb-1 ${currentEvent.payload.wasHidden ? 'text-red-400' : 'text-amber-400'}`}>
                    {currentEvent.payload.wasHidden ? 'Anomaly · Hidden' : 'Anomaly · Known'}
                  </div>
                  <div className="text-base font-black text-white">{currentEvent.payload.label}</div>
                  <div className="font-mono text-xl font-black mt-2">
                    <span className={currentEvent.payload.wasHidden ? 'text-red-400' : 'text-amber-400'}>
                      +{currentEvent.payload.risk} <span className="text-[10px] text-neutral-500">Risk</span>
                    </span>
                  </div>
                </div>
              )}
              {currentEvent && currentEvent.type === 'land' && (
                <div key={`step-${revealStep}`} className="reveal-card-enter text-center">
                  {/* (Fix F2) Renewal Verdict — only fires when this was a renewal AND the
                      outcome blew up. Names the merchant by the music sting. Surfaces above
                      the band name so the callback weight registers BEFORE the result. */}
                  {boss?.callback && (currentEvent.payload.bandName === 'Default' || currentEvent.payload.bandName === 'Collapse' || currentEvent.payload.bandName === 'Breach') && (
                    <div className="mb-3">
                      <div className="text-[10px] uppercase font-bold tracking-widest text-red-500">Renewal Verdict</div>
                      <div className="text-base sm:text-lg font-black text-red-300 italic">
                        {boss.callback.merchantName}
                        {boss.callback.dayCleared && <span className="text-neutral-500 font-normal"> · funded Day {boss.callback.dayCleared}</span>}
                      </div>
                    </div>
                  )}
                  <div className={`text-5xl sm:text-6xl font-black uppercase tracking-tight mb-2 ${toneClass}`}>
                    {currentEvent.payload.bandName}
                  </div>
                  <div className="font-mono text-2xl font-black">
                    {currentEvent.payload.net > 0 && <span className="text-emerald-400">+{formatMoney(currentEvent.payload.net)}</span>}
                    {currentEvent.payload.net < 0 && <span className="text-red-400">{formatMoney(currentEvent.payload.net)}</span>}
                    {currentEvent.payload.net === 0 && <span className="text-neutral-500">$0</span>}
                  </div>
                  {currentEvent.payload.damage > 0 && currentEvent.payload.profit > 0 && (
                    <div className="text-xs text-neutral-500 font-mono mt-2">
                      Profit {formatMoney(currentEvent.payload.profit)} · Damage −{formatMoney(currentEvent.payload.damage)}
                    </div>
                  )}
                  {revealDone && (
                    <div className="text-[11px] uppercase tracking-widest text-neutral-500 mt-6 animate-pulse font-bold">Tap to continue</div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
        {globalAudioControlJsx}
      </div>
    );
  }

  if (gameState === 'RESOLUTION') {
    const isBlocked = lastOutcome?.blocked;
    const success = lastOutcome?.success;
    const toneBorder = {
      emerald: 'border-emerald-900/50',

  // ENCOUNTER ===============================================================

            <div className="flex justify-end gap-0.5 pt-0.5 items-center">

      </header>

      {/* Main */}

              {boss.state.noCOJ && (

            {(() => {

                {boss.deteriorations.map((d, i) => (

                    <span className="text-amber-500 shrink-0">▸</span>

          </div>

          {/* Read indicator + active mods */}
          <div className="flex items-center justify-between mt-3 pt-3 border-t border-neutral-800 gap-2 flex-wrap">
            <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-bold">
              Read <span className="font-mono text-neutral-300">{revealedCount}/{totalAttrs}</span>
              {boss.anomaliesRevealed && <span className="text-purple-400 ml-2">· Anomalies revealed</span>}

            {activeMods.length > 0 && (
              <div className="flex gap-1 flex-wrap">

                    {m.name}
                    {m.risk ? ` ${m.risk > 0 ? '+' : ''}${m.risk}r` : ''}

          </button>
          <button onClick={endTurn}
            className="flex-[2] py-3 sm:py-4 bg-amber-700/20 hover:bg-amber-700/40 border border-amber-700/50 rounded-xl font-bold text-amber-300 transition-colors uppercase tracking-widest text-xs sm:text-sm flex items-center justify-center gap-2">
            <RefreshCw size={14} /> End Turn
            {boss.hp > 0 && boss.intent && FILE_ABILITIES[boss.intent] && (
              <span className="text-[9px] font-mono text-amber-400/80 hidden sm:inline">(file: {FILE_ABILITIES[boss.intent].name})</span>
            )}
          </button>
          <button onClick={executeOffer}
            disabled={capital < Math.floor(boss.requested * offerParams.advancePct)}
            className={`flex-[3] py-3 sm:py-4 rounded-xl font-black text-white transition-all uppercase tracking-widest text-xs sm:text-sm disabled:opacity-40 disabled:cursor-not-allowed border ${
              boss.hp === 0
                ? 'bg-emerald-600 hover:bg-emerald-500 border-emerald-500 shadow-[0_0_20px_rgba(5,150,105,0.55)]'
                : 'bg-emerald-800/70 hover:bg-emerald-700 border-emerald-700/60'
            }`}>
            {boss.hp === 0 ? 'Submit (File Vetted)' : `Submit Now (HP penalty)`}
          </button>
        </div>
      </main>

      {/* Modals */}
      {showDeckPanel && (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setShowDeckPanel(false)}>
          <div className="bg-neutral-900 border border-neutral-800 rounded-2xl p-5 max-w-2xl w-full max-h-[80vh] overflow-y-auto scrollbar-thin" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-4">
              <h3 className="font-black uppercase tracking-widest text-white text-base">Your Deck ({deck.length})</h3>
              <button onClick={() => setShowDeckPanel(false)} className="text-neutral-400 hover:text-white"><X size={18} /></button>
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
              {deck.map((card) => (
                <div key={card.uid} className={`p-2 rounded-lg border ${card.color}`}>
                  <div className="flex items-center gap-2">
                    <card.icon size={12} />
                    <span className="text-[11px] font-bold uppercase">{card.name}</span>
                  </div>
                  <div className="text-[10px] opacity-70 font-mono mt-1 leading-tight">{card.desc}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
      {showBank && boss && (
        <BankStatementModal
          boss={boss}
          onClose={() => setShowBank(false)}
          anomaliesVisible={boss.anomaliesRevealed && !boss.forgedDocs}
          topAnomaly={!boss.anomaliesRevealed && relics.includes('r_forensic') && !boss.forgedDocs}
        />
      )}
      {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
      {globalAudioControlJsx}
    </div>
  );
}

// Error boundary so a runtime error surfaces visibly instead of blanking the page.
class GambitErrorBoundary extends React.Component {
  constructor(p) { super(p); this.state = { error: null, info: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { this.setState({ info }); console.error('Gambit error:', error, info); }
  render() {
    if (!this.state.error) return this.props.children;
    return (
      <div style={{ minHeight: '100vh', background: '#0a0a0a', color: '#fca5a5', padding: 32, fontFamily: 'ui-monospace,Menlo,Consolas,monospace', fontSize: 13, overflow: 'auto' }}>
        <h1 style={{ color: '#f87171', fontSize: 20, fontWeight: 800, marginBottom: 12 }}>Underwriter's Gambit — runtime crash</h1>
        <p style={{ color: '#a3a3a3', marginBottom: 16 }}>The game caught an error during render. Copy the trace below and send it back so we can fix it.</p>
        <div style={{ background: '#171717', border: '1px solid #404040', borderRadius: 8, padding: 16, whiteSpace: 'pre-wrap', wordBreak: 'break-word' }}>
          <strong style={{ color: '#fca5a5' }}>{String(this.state.error?.message || this.state.error)}</strong>
          {'\n\n'}
          <span style={{ color: '#737373' }}>{String(this.state.error?.stack || '')}</span>
          {this.state.info && <><br /><br /><span style={{ color: '#737373' }}>{String(this.state.info.componentStack || '')}</span></>}
        </div>
        <button onClick={() => location.reload()} style={{ marginTop: 16, padding: '8px 16px', background: '#525252', color: '#fff', border: '1px solid #737373', borderRadius: 6, cursor: 'pointer' }}>Reload</button>
      </div>
    );
  }
}

const root = createRoot(document.getElementById('root'));
try {
  root.render(<GambitErrorBoundary><UnderwritersGambit /></GambitErrorBoundary>);
} catch (e) {
  document.getElementById('root').innerHTML = '<div style="padding:32px;color:#f87171;font-family:monospace;font-size:13px;background:#0a0a0a;min-height:100vh"><h1 style="font-size:20px;font-weight:800;margin-bottom:12px">Render failed before mount</h1><pre style="white-space:pre-wrap">' + (e.stack || e.message) + '</pre></div>';
  console.error('Gambit mount error:', e);
}
</script>
</body>
</html>
