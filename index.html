<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Underwriter's Gambit</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<style>
  body { background: #0a0a0a; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #404040; border-radius: 3px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #525252; }
  input[type=range] { -webkit-appearance: none; }
  /* prevent iOS button highlight */
  button { touch-action: manipulation; }

  /* === START SCREEN ANIMATIONS === */
  /* The screen letterboxes a fixed-aspect "stage" matching the image ratio (1408/768).
     All overlays (rain, neon, menu hotspots) live INSIDE the stage so their % positions
     line up pixel-correct with the baked-in art regardless of viewport. */
  .start-screen {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #050108;
    display: flex;
    align-items: center;
    justify-content: center;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    -ms-interpolation-mode: nearest-neighbor;
  }
  .start-stage {
    position: relative;
    aspect-ratio: 1408 / 768;
    width: 100%;
    max-width: calc(100vh * 1408 / 768);
    max-height: 100vh;
    overflow: hidden;
  }
  .start-bg {
    position: absolute; inset: 0;
    background-image: url('assets/Start.png');
    background-size: 100% 100%;          /* exact fit since stage matches image aspect */
    background-position: center;
    background-repeat: no-repeat;
    image-rendering: pixelated;
  }
  /* Fallback when image isn't saved yet */
  .start-bg-fallback {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, #1a0d2e 0%, #0d0420 60%, #050108 100%);
  }
  .start-rain {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 3;
    mix-blend-mode: screen;
    opacity: 0.55;
  }
  /* Neon flicker overlay — broad, additive, reads through the cityscape */
  .start-neon {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 2;
    mix-blend-mode: screen;
    background:
      radial-gradient(ellipse 300px 200px at 18% 18%, rgba(168,85,247,0.18), transparent 70%),
      radial-gradient(ellipse 220px 160px at 30% 14%, rgba(34,211,238,0.16), transparent 70%),
      radial-gradient(ellipse 260px 200px at 52% 12%, rgba(236,72,153,0.14), transparent 70%),
      radial-gradient(ellipse 280px 220px at 72% 16%, rgba(16,185,129,0.16), transparent 70%),
      radial-gradient(ellipse 240px 180px at 86% 20%, rgba(34,211,238,0.18), transparent 70%);
    animation: neon-pulse 4.2s ease-in-out infinite;
  }
  @keyframes neon-pulse {
    0%, 100% { opacity: 0.85; filter: hue-rotate(0deg); }
    20%      { opacity: 1.00; }
    34%      { opacity: 0.65; }
    36%      { opacity: 0.95; }
    50%      { opacity: 0.80; filter: hue-rotate(-8deg); }
    72%      { opacity: 1.00; }
    74%      { opacity: 0.55; }
    78%      { opacity: 0.92; }
  }
  /* Subtle vignette so menu reads against bright neon */
  .start-vignette {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 4;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
  }
  /* HTML title — only renders when bg image isn't loaded, so it doesn't double-up with baked-in title. */
  .start-title-wrap {
    position: absolute;
    z-index: 6;
    left: 50%; top: 38%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    user-select: none;
  }
  .start-title {
    font-weight: 900;
    font-size: clamp(48px, 9vw, 96px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: #c084fc;
    text-shadow:
      0 0 6px rgba(192,132,252,0.85),
      0 0 18px rgba(192,132,252,0.55),
      0 0 36px rgba(168,85,247,0.4),
      0 4px 0 rgba(0,0,0,0.5);
    animation: title-pulse 5s ease-in-out infinite;
  }
  .start-subtitle {
    font-weight: 800;
    font-size: clamp(11px, 1.3vw, 14px);
    letter-spacing: 0.45em;
    margin-top: 6px;
    color: #6ee7b7;
    text-shadow: 0 0 8px rgba(110,231,183,0.7), 0 0 16px rgba(16,185,129,0.4);
  }
  @keyframes title-pulse {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(1.15); }
  }

  /* Menu container — positioned over the baked-in pixel-art menu band (y ~75-90% of image). */
  .start-menu {
    position: absolute;
    z-index: 6;
    left: 50%; top: 75.5%;
    transform: translateX(-50%);
    display: flex; flex-direction: column;
    gap: 0.18em;
    align-items: center;
    text-align: center;
    pointer-events: auto;
  }
  .start-menu-btn {
    background: transparent;
    border: 0;
    padding: 4px 28px;
    color: #f5f5f5;
    cursor: pointer;
    font-weight: 900;
    font-size: clamp(16px, 2.1vw, 24px);
    letter-spacing: 0.08em;
    line-height: 1.15;
    border-radius: 4px;
    position: relative;
    transition: transform 0.15s ease, color 0.15s ease, filter 0.15s ease;
    text-shadow:
      0 0 4px rgba(0,0,0,0.95),
      0 0 12px rgba(0,0,0,0.7),
      2px 2px 0 rgba(0,0,0,0.85);
    font-family: ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
  }
  .start-menu-btn::before {
    content: '';
    position: absolute; inset: -4px -14px;
    border-radius: 6px;
    background: radial-gradient(ellipse at center, rgba(168,85,247,0.55), rgba(34,211,238,0.22) 55%, transparent 80%);
    opacity: 0;
    transition: opacity 0.18s ease;
    pointer-events: none;
    mix-blend-mode: screen;
    z-index: -1;
  }
  .start-menu-btn:hover {
    transform: scale(1.06);
    color: #f0abfc;
    filter: drop-shadow(0 0 10px rgba(168,85,247,0.85));
  }
  .start-menu-btn:hover::before { opacity: 1; }

  /* When the background image is loaded, the user's baked-in pixel-art menu is already visible.
     Hide our HTML button text so it doesn't double-up; keep the buttons as click hotspots with
     hover-only glow. The baked-in text serves as the visible label. */
  .start-screen.bg-loaded .start-menu-btn {
    color: transparent;
    text-shadow: none;
  }
  .start-screen.bg-loaded .start-menu-btn:hover {
    color: transparent;          /* still no text overlay on hover */
    filter: none;
  }
  .start-screen.bg-loaded .start-menu-btn:hover::before {
    opacity: 1;                  /* but DO show the radial glow over the baked-in text */
  }

  /* Banner shown only while the optional background image is missing — quiet hint, not a blocker. */
  .start-image-hint {
    position: absolute;
    bottom: 18px; left: 18px;
    z-index: 7;
    font-size: 11px;
    font-family: ui-monospace, "Cascadia Mono", Menlo, Consolas, monospace;
    color: #94a3b8;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 6px 10px;
    backdrop-filter: blur(4px);
    line-height: 1.4;
    max-width: 320px;
  }
  .start-image-hint code {
    color: #c4b5fd;
    background: rgba(255,255,255,0.05);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 10px;
  }
  /* CRT scanlines — very subtle, reinforce the pixel-art-on-monitor feel */
  .start-scanlines {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 5;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.10) 0 1px, transparent 1px 3px);
    mix-blend-mode: multiply;
    opacity: 0.55;
  }

  /* === RESOLUTION_REVEAL ANIMATIONS (Fix F1: Submit Reveal Sequence) ===
     Retires symptoms 2 (no moment-of-truth on submit), 3 (no card-play juice on resolution),
     and 18 (post-resolution screen as static spreadsheet). The reveal sequence is the new
     drama beat — these keyframes drive the per-card cascade, the anomaly surface, the
     risk-meter sweep, and the band lock-in. */
  @keyframes revealEnter {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }
  @keyframes revealExit {
    from { opacity: 1; transform: translateY(0)     scale(1); }
    to   { opacity: 0; transform: translateY(-8px)  scale(0.97); }
  }
  @keyframes panelShake {
    0%   { transform: translateX(0); }
    20%  { transform: translateX(8px) translateY(-2px); }
    40%  { transform: translateX(-6px) translateY(1px); }
    60%  { transform: translateX(4px); }
    80%  { transform: translateX(-2px); }
    100% { transform: translateX(0); }
  }
  @keyframes wrapperShake {
    0%   { transform: translate(0, 0); }
    25%  { transform: translate(3px, -2px); }
    50%  { transform: translate(-2px, 2px); }
    75%  { transform: translate(2px, 1px); }
    100% { transform: translate(0, 0); }
  }
  @keyframes screenFlash {
    0%   { opacity: 0; }
    20%  { opacity: 0.08; }
    100% { opacity: 0; }
  }
  @keyframes meterPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
    50%      { box-shadow: 0 0 0 5px rgba(255,255,255,0.10); }
  }
  @keyframes needleSettle {
    0%   { transform: translateX(-50%) scale(1); }
    50%  { transform: translateX(-50%) scale(1.4); }
    100% { transform: translateX(-50%) scale(1); }
  }
  .reveal-card-enter   { animation: revealEnter 200ms cubic-bezier(0.16, 1, 0.3, 1) both; }
  .reveal-card-exit    { animation: revealExit 150ms ease-in both; }
  .reveal-shake        { animation: panelShake 100ms ease-in-out; }
  .reveal-wrapper-shake { animation: wrapperShake 80ms ease-out; }
  .reveal-screen-flash { animation: screenFlash 600ms ease-out; pointer-events: none; }
  .reveal-meter-pulse  { animation: meterPulse 600ms ease-out; }
  .reveal-needle-settle { animation: needleSettle 240ms ease-out; }
  .risk-needle         { transition: left 800ms cubic-bezier(0.16, 1, 0.3, 1); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" data-type="module">
import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.3.1';
import { createRoot } from 'https://esm.sh/react-dom@18.3.1/client';
import {

  Zap, Layers, X, ChevronRight, ChevronUp, ChevronDown, Map, MapPin, Briefcase, Store,

// ============================================================================
// CONSTANTS
// ============================================================================

const PROMOTION_DAY = 10;
const STARTING_CAPITAL = 50000;

const INDUSTRIES = [
  { id: 'restaurant',   name: 'Restaurant',     baseRisk: 25, volMultiplier: 12, icon: '🍽️' },
  { id: 'trucking',     name: 'Trucking',       baseRisk: 30, volMultiplier: 18, icon: '🚛' },
  { id: 'construction', name: 'Construction',   baseRisk: 28, volMultiplier: 15, icon: '🏗️' },
  { id: 'retail',       name: 'Retail',         baseRisk: 22, volMultiplier: 8,  icon: '🛍️' },
  { id: 'medical',      name: 'Medical',        baseRisk: 12, volMultiplier: 4,  icon: '🩺' },
  { id: 'auto',         name: 'Auto Repair',    baseRisk: 20, volMultiplier: 10, icon: '🔧' },
  { id: 'manufact',     name: 'Manufacturing',  baseRisk: 18, volMultiplier: 5,  icon: '🏭' },
  { id: 'tech',         name: 'Tech / SaaS',    baseRisk: 24, volMultiplier: 14, icon: '💻' },
  { id: 'salon',        name: 'Salon / Spa',    baseRisk: 21, volMultiplier: 9,  icon: '💇' },
  { id: 'logistics',    name: 'Logistics',      baseRisk: 26, volMultiplier: 13, icon: '📦' },
];

const STATES = [
  { code: 'NY', name: 'New York',     factorCap: 1.45, riskMod: +5, noCOJ: true,  note: 'Strict regulation; COJs banned 2019 (CPLR 3218).' },
  { code: 'NJ', name: 'New Jersey',   factorCap: 1.49, riskMod: 0,  noCOJ: true,  note: 'Standard MCA market; COJs not enforceable.' },
  { code: 'CA', name: 'California',   factorCap: 1.40, riskMod: -3, noCOJ: true,  note: 'SB-1235 disclosure required; COJs banned.' },
  { code: 'FL', name: 'Florida',      factorCap: 1.49, riskMod: +3, noCOJ: false, note: 'Volatile; high fraud activity. COJs enforceable.' },
  { code: 'TX', name: 'Texas',        factorCap: 1.49, riskMod: 0,  noCOJ: false, note: 'Stable, business-friendly. COJs enforceable.' },
  { code: 'PA', name: 'Pennsylvania', factorCap: 1.49, riskMod: 0,  noCOJ: false, note: 'Standard market. COJs enforceable.' },

// Merchant names — industry-keyed pools so renewal callbacks identify a SPECIFIC merchant
// the player funded. Real MCA merchants are usually owner-named ("Sal's Pizza", "Garcia
// Auto Body") — the pools honor that. Used by pickMerchantName below.
// (Fix F2 — Renewal Callback Cards. Retires symptom 6 — renewals didn't feel like callbacks.)
const MERCHANT_NAMES = {
  restaurant:  ["Mama Sofia's Pizzeria", "El Tacolote", "The Iron Skillet", "Chez Marcel", "Lin's Dumpling House", "Brick & Salt Bistro", "Mercurio's Trattoria", "Beachside Café"],
  trucking:    ["Velasquez Hauling", "Big Sky Logistics Co", "Reyes & Sons Trucking", "Northbound Freight", "Cargo King LLC", "Tio Hauling", "Stateline Truckers", "Apex Long-Haul"],
  construction:["Hank's General Contracting", "Romero Builders", "Blackstone Construction", "Ironclad Roofing", "Vega & Sons Excavation", "Steel Bridge Contractors", "Sunrise Concrete", "DeMarco Custom Homes"],
  retail:      ["Corner Pocket Variety", "Park Avenue Boutique", "Manny's Discount Mart", "Riverside Bookshop", "Gianni's Menswear", "Tan & Lace Fashion", "The Sneaker Vault", "Patel Family Mini-Mart"],
  medical:     ["Westwood Family Dental", "Dr. Patel Internal Medicine", "Riverside Chiropractic", "Sunset Vision Care", "Greenfield Pediatrics", "Compass Behavioral Health", "Park Slope Orthodontics", "Halsey Sports Therapy"],
  auto:        ["Garcia Auto Body", "Hank's Garage", "Triple-A Mechanics", "Vinny's Automotive", "Reyes Tire & Lube", "Sunrise Auto Repair", "DiMarco Brake Shop", "Liberty Transmission"],
  manufact:    ["Beacon Industrial", "Velasquez Metalworks", "Coastal Plastics LLC", "DeMarco Manufacturing", "Stateline Tooling", "Northwood Lumber Mill", "Apex Component Group", "Liberty Castings"],
  tech:        ["Pixel Forge LLC", "Greenstack Software", "Northbound Systems", "Trailmark Cloud Services", "DataLeaf Inc", "Quantum Path Analytics", "Verdigris IT Solutions", "Marrow Studios"],
  salon:       ["Glow Salon & Spa", "The Ivy Cut", "Marisol's Hair Studio", "Sunset Nails", "Vanity Lash Bar", "Park Place Barber Shop", "Tropic Spa Retreat", "Dahlia Cosmetics"],
  logistics:   ["Reyes Last-Mile", "Beacon Distribution", "Stateline Logistics LLC", "Coastal Cross-Dock", "Apex Warehouse Solutions", "Northwood Pallet Co", "Velasquez Distribution", "Marrow Fulfillment"],
};
function pickMerchantName(industry, usedNames) {
  const pool = MERCHANT_NAMES[industry?.id] || [];
  const used = usedNames instanceof Set ? usedNames : new Set(usedNames || []);
  const available = pool.filter((n) => !used.has(n));
  if (available.length > 0) return available[Math.floor(Math.random() * available.length)];
  // Fallback: industry name + 4-digit suffix when pool is exhausted (rare — 80 names total).
  return `${industry?.name || 'Merchant'} #${Math.floor(Math.random() * 9000 + 1000)}`;
}

const ISOS = [
  { id: 'apex',     name: 'Apex Capital Group',   tier: 'Premier',     riskMod: -8,  fraudChance: 0.02, color: 'text-emerald-400', tierBg: 'bg-emerald-900/30 border-emerald-700/50' },
  { id: 'vanguard', name: 'Vanguard Brokers',     tier: 'Premier',     riskMod: -8,  fraudChance: 0.02, color: 'text-emerald-400', tierBg: 'bg-emerald-900/30 border-emerald-700/50' },
  { id: 'atlantic', name: 'Atlantic ISO',         tier: 'Standard',    riskMod: 0,   fraudChance: 0.06, color: 'text-blue-400',    tierBg: 'bg-blue-900/30 border-blue-700/50' },
  { id: 'hudson',   name: 'Hudson Funding Group', tier: 'Standard',    riskMod: 0,   fraudChance: 0.06, color: 'text-blue-400',    tierBg: 'bg-blue-900/30 border-blue-700/50' },
  { id: 'boom',     name: 'Boom Boom Submissions',tier: 'Aggressive',  riskMod: +10, fraudChance: 0.15, color: 'text-amber-400',   tierBg: 'bg-amber-900/30 border-amber-700/50' },
  { id: 'stack',    name: 'Stack Brothers Cap',   tier: 'Aggressive',  riskMod: +12, fraudChance: 0.18, color: 'text-amber-400',   tierBg: 'bg-amber-900/30 border-amber-700/50' },
  { id: 'quick',    name: 'Quick Pitch LLC',      tier: 'Boiler Room', riskMod: +20, fraudChance: 0.30, color: 'text-red-400',     tierBg: 'bg-red-900/30 border-red-700/50' },
];

// Each anomaly is a clickable forensic flag in the bank-statement modal. The risk number
// is added to the file's hidden default probability — finding & accounting for anomalies
// is what real MCA UWs do staring at three months of statements.
const ANOMALY_TYPES = {

  reversed_wire:      { label: 'Reversed Wire',         desc: 'Recent wire reversal — counterparty disputed the transaction.',                             risk: 6,  icon: Undo2 },

  eod_zero:           { label: 'End-of-Day Zero',       desc: 'Account swept to ~$0 nightly — used as conduit, not primary operating account.',           risk: 12, icon: Banknote },
  round_deposits:     { label: 'Round-Number Deposits', desc: 'Suspicious round-number incoming wires with no source or invoice trail.',                   risk: 8,  icon: DollarSign },
  multiple_mca:       { label: 'Stacked MCA Debits',    desc: 'Three+ daily MCA debits visible — heavy concurrent stacking by other funders.',             risk: 20, icon: Layers },
  declining_revenue:  { label: 'Declining Revenue',     desc: 'Month-over-month deposit total trending down 15%+ — business deteriorating.',                risk: 10, icon: TrendingDown },
  cross_collateral:   { label: 'Cross-Collateral Hint', desc: 'Inter-company wires between affiliated entities — collateral may be encumbered elsewhere.',  risk: 7,  icon: Link2 },
  large_cash_out:     { label: 'Large Cash Withdrawal', desc: 'Single cash withdrawal exceeding 1/3 of monthly revenue — unrecorded payout or diversion.',   risk: 5,  icon: Banknote },
};

// === CARD COLORS — semantic by play role, not by class ===
const CC_REVEAL    = 'bg-blue-900/40 border-blue-500/50 text-blue-300';
const CC_DEFENSIVE = 'bg-emerald-900/40 border-emerald-500/50 text-emerald-300';
const CC_AGGRO     = 'bg-red-900/40 border-red-500/50 text-red-300';

// === BASIC STARTER CARDS — every underwriter's opening 8 = 5 Push Rate + 3 Tighten Up ===
const BASIC_CARDS = [
  { id: 'c_push', name: 'Push Rate', type: 'MODIFIER', energy: 1, mod: { factor: +0.03 },
    desc: '+0.03 Factor.', icon: TrendingUp, color: CC_AGGRO,

// === CLASS SIGNATURES — one joins the starting deck on character select ===
const SIGNATURE_CARDS = [
  { id: 's_branden', name: 'Game Plan', type: 'UTILITY', energy: 1, mod: { factor: +0.02, risk: -5 }, draw: 1,

  { id: 's_brendan', name: 'Senior Review', type: 'REVEAL', target: 'all_basic', energy: 2,
    desc: 'Reveal FICO, TIB, Position, Bank.', icon: BookOpen, color: CC_FORENSIC,
    tooltip: "Brendan's signature. Pulls a senior pass on the file in one motion — credit, time-in-business, UCC position, and bank statements all reveal at once. Anomalies still need Forensic Review." },
  { id: 's_keith', name: 'The Walk Away', type: 'DECLINE', energy: 0, bonus: 400,
    desc: 'Decline this file. +$400 commission.', icon: Undo2, color: CC_DECLINE,
    tooltip: "Keith's signature. Files he won't touch get a fast no plus a side commission for the broker contact. Best card on a garbage file you read in five seconds." },
  { id: 's_isaac', name: 'The Pitch', type: 'MODIFIER', energy: 1,
    mod: { factor: +0.05, risk: +3, condition: 'factor_at_cap', condRisk: -10 },

  { id: 's_alexander', name: 'Adrenaline', type: 'UTILITY', energy: 0, val: 1, draw: 2,

// === BRANDEN — The Strategist (planning / balanced hybrid / steady compounding) ===

// HELPER FUNCTIONS

const formatMoney = (n) => '$' + Math.round(n).toLocaleString();
const formatPct = (n) => Math.round(n * 100) + '%';
const shuffle = (arr) => arr.slice().sort(() => Math.random() - 0.5);

const removalCost = (day) => 75 + Math.floor((day - 1) / 2) * 25;
const refreshCost = (day) => 50 + (day - 1) * 25;
const priceMultiplier = (day) => 1 + Math.floor((day - 1) / 3) * 0.25;

// Day-based difficulty escalation. Files get tougher as you progress.
const dayDifficulty = (day) => Math.floor((day - 1) / 3) * 5; // +0/5/10/15

// === Term sheet lever risk functions ===
// Each returns the risk delta for moving that lever from baseline.
// Calibrated so that the default offer (70% / 90d / 12% / 1.42) yields 0 net risk delta.

function advanceRiskFn(pct) {
  const delta = pct - 0.70;
  if (delta >= 0) return Math.round(delta * 30);   // +30 risk per +100% advance over 70%
  return Math.round(delta * 20);                    // -20 per -100% (smaller advance is safer)
}
function termRiskFn(days) {
  const delta = days - 90;
  if (delta >= 0) return Math.round(delta / 6);    // +1 risk per 6 days over 90
  return Math.round(delta / 10);                    // -1 risk per 10 days under 90
}
function holdbackRiskFn(pct) {
  if (pct >= 0.10 && pct <= 0.16) return -2;       // sweet spot
  if (pct < 0.08) return 6;                         // too lax, merchant deteriorates undetected
  if (pct > 0.20) return 5;                         // too aggressive, chokes operations
  return 0;
}
function factorRiskFn(factor) {
  const delta = factor - 1.40;
  return Math.round(delta * 100);                  // ~+1 risk per +0.01 factor
}

const clampFactor = (factor, state) => Math.min(factor, state.factorCap);

// === Card mod evaluation (handles conditional + scaling effects) ===
// Some cards define their effect by *context* — e.g. "+0.03 Factor per visible anomaly,"
// "-15 Risk if all 4 attrs revealed," "+0.04 Factor if Factor at state cap." Rather than
// pre-bake those at play time, we re-evaluate on every render against current ctx.

function countRevealed(boss) {
  if (!boss) return 0;
  return Object.values(boss.hidden).filter((h) => h.revealed).length;
}
function countAnomaliesVisible(boss) {
  if (!boss) return 0;
  if (boss.forgedDocs && !boss.anomaliesRevealed) return 0;
  return boss.anomaliesRevealed ? (boss.anomalies || []).length : 0;
}
function evalCondition(cond, ctx) {
  switch (cond) {
    case 'factor_at_cap':         return ctx.factorVal >= ctx.boss.state.factorCap - 0.001;
    case 'requested_20k':         return ctx.boss.requested >= 20000;
    case 'tib_low_revealed':      return ctx.boss.hidden.tib.revealed && ctx.boss.hidden.tib.value <= 2;
    case 'stacking_visible':      return ctx.anomalyCount > 0 && (ctx.boss.anomalies || []).some((a) => a === 'multiple_mca' || a === 'undisclosed_mca');
    case 'all_revealed':          return ctx.revealedCount >= 4;
    case 'position_2plus':        return ctx.boss.hidden.position.revealed && ctx.boss.hidden.position.value >= 2;
    case 'iso_tier_premier':      return ctx.boss.iso.tier === 'Premier';
    case 'iso_tier_premier_or_standard': return ctx.boss.iso.tier === 'Premier' || ctx.boss.iso.tier === 'Standard';
    case 'iso_tier_aggressive_or_worse': return ctx.boss.iso.tier === 'Aggressive' || ctx.boss.iso.tier === 'Boiler Room';
    case 'industry_trucking':     return ctx.boss.industry.id === 'trucking';
    case 'state_strict':          return ctx.boss.state.code === 'NY' || ctx.boss.state.code === 'CA';
    case 'state_strict_inverse':  return !(ctx.boss.state.code === 'NY' || ctx.boss.state.code === 'CA');
    case 'state_coj_eligible':    return !['NY', 'NJ', 'CA'].includes(ctx.boss.state.code);
    case 'count_modifiers_2plus': return ctx.modCount >= 2;
    case 'is_renewal':            return !!ctx.boss.isRenewal;
    default:                      return false;
  }
}
// Returns a per-mod breakdown so UIs can show "where does this point of risk come from?"
function evaluateModsBreakdown(activeMods, ctx) {
  const otherMods = Math.max(0, ctx.modCount - 1);
  return activeMods.map((m) => {
    let risk = 0, factor = 0;
    if (m.risk)   risk   += m.risk;
    if (m.factor) factor += m.factor;
    if (m.perRevealedRisk)   risk   += m.perRevealedRisk * ctx.revealedCount;
    if (m.perRevealedFactor) factor += m.perRevealedFactor * ctx.revealedCount;
    if (m.perAnomalyRisk)    risk   += m.perAnomalyRisk * ctx.anomalyCount;
    if (m.perAnomalyFactor)  factor += m.perAnomalyFactor * ctx.anomalyCount;
    if (m.perActiveModRisk)   risk   += m.perActiveModRisk * otherMods;
    if (m.perActiveModFactor) factor += m.perActiveModFactor * otherMods;
    if (m.condition && evalCondition(m.condition, ctx)) {
      if (m.condRisk)   risk   += m.condRisk;
      if (m.condFactor) factor += m.condFactor;
    }
    // Pari passu bonus is conditional on actual position (visible or not) — matches prior behavior
    if (m.paripassu && ctx.boss.hidden.position.value >= 2) risk += -15;
    return { name: m.name, risk, factor };
  });
}
function evaluateMods(activeMods, ctx) {
  const parts = evaluateModsBreakdown(activeMods, ctx);
  let risk = 0, factor = 0;
  for (const p of parts) { risk += p.risk; factor += p.factor; }
  return { risk, factor };
}

// === Underwriting vitals (real platform mirrors) ===
// Leverage cap by term length — straight from Cobalt UW guidelines (Vault Vision):
//   <22 weeks → 40%, 22–28 weeks → 37%, >28 weeks → 35%.
function leverageCapForTerm(termDays) {
  const weeks = termDays / 7;
  if (weeks < 22) return 0.40;
  if (weeks <= 28) return 0.37;
  return 0.35;
}
// Estimate existing monthly MCA debits from UCC position. Position 1 = no concurrent stack.
// Each subordinate position implies another funder pulling daily — proxy at 8% of monthly rev each.
function estimateExistingMonthlyDebit(positionVal, monthlyRev) {
  if (!positionVal || positionVal <= 1 || !monthlyRev) return 0;
  return Math.round(monthlyRev * 0.08 * (positionVal - 1));
}

// === Outcome bands ===
// Replaces the old d100 roll with a deterministic-with-vol-swing model.
// Player choices set the risk score; outcome is then read off these thresholds, not rolled.
// Industry volatility shifts you within ~one band, never across the whole spectrum.
const RISK_BANDS = [
  { max: 25,  id: 'CLEAR_STRONG', name: 'Clean Clear',   tone: 'emerald', isDefault: false, profitMult: 1.10, recovery: 1,    note: 'File priced well below stress. Merchant pays out ahead of schedule and the early-payoff fee adds spread.' },
  { max: 50,  id: 'CLEAR',        name: 'Cleared',       tone: 'emerald', isDefault: false, profitMult: 1.00, recovery: 1,    note: 'Standard payoff. File performed in line with the underwrite.' },
  { max: 65,  id: 'STRESSED',     name: 'Stressed',      tone: 'amber',   isDefault: false, profitMult: 0.65, recovery: 1,    note: 'Merchant paid in full but missed remits along the way. Workout fees and renegotiated terms ate ~35% of your spread.' },
  { max: 80,  id: 'BREACH',       name: 'Breach',        tone: 'red',     isDefault: true,  profitMult: 0,    recovery: 0.55, note: 'Merchant breached after partial payment. Recovered ~55% of advance via collections; the rest is gone.' },
  { max: 95,  id: 'DEFAULT',      name: 'Default',       tone: 'red',     isDefault: true,  profitMult: 0,    recovery: 0.25, note: 'Hard default. The remit chain stopped, the principal stopped answering. ~25% recovered.' },
  { max: 999, id: 'COLLAPSE',     name: 'Collapse',      tone: 'red',     isDefault: true,  profitMult: 0,    recovery: 0,    note: 'Total collapse — fraud, bankruptcy, or both. No recovery.' },
];
function classifyRiskBand(stressedRisk) {
  for (const b of RISK_BANDS) if (stressedRisk < b.max) return b;
  return RISK_BANDS[RISK_BANDS.length - 1];
}

// === Combat: file abilities + intents ===
// Each file is an "enemy" with HP. Cards do damage to chip the file's stubbornness.
// The file fights back via abilities — telegraphed each turn as an intent (icon + tooltip).
// This integrates with the risk-band system: the encounter ends when HP hits 0 or turn limit
// is reached, and the accumulated risk score then picks the outcome band.
const FILE_ABILITIES = {
  stacking_surge:  { name: 'Stacking Surge',   intent: 'risk_up',     value: 8,    desc: 'Concurrent funder pulls another debit. +8 Risk on resolve.', icon: 'Layers' },
  nsf_spike:       { name: 'NSF Spike',        intent: 'risk_up',     value: 5,    desc: 'New NSFs hit the bank ledger. +5 Risk.',                       icon: 'AlertTriangle' },
  forged_docs:     { name: 'Forged Docs',      intent: 'block_self',  value: 6,    desc: 'Merchant scrubs the statements. File gains 6 Block.',          icon: 'FileText' },
  broker_pressure: { name: 'Broker Pressure',  intent: 'factor_down', value: 0.04, desc: 'Broker negotiates the rate down. Final factor -0.04.',         icon: 'Phone' },
  cash_crisis:     { name: 'Cash Crisis',      intent: 'risk_dot',    value: 3,    desc: 'Operating cash crater. +3 Risk this turn AND every turn after.',icon: 'TrendingDown' },
  hide_attribute:  { name: 'Smoke & Mirrors',  intent: 'rehide',      value: 1,    desc: 'Random revealed attribute is hidden again.',                   icon: 'EyeOff' },
  // --- Final-boss-only kit (Mike Lindel, Day 10) ---
  infomercial_push:{ name: 'Infomercial Push', intent: 'heal',        value: 14,   desc: 'Late-night TV ad blitz. File regenerates 14 HP — every minute is two-payment.', icon: 'TrendingUp' },
  subprime_slumber:{ name: 'Sub-Prime Slumber',intent: 'risk_dot',    value: 5,    desc: 'Whole portfolio is sleeping on subprime risk. +5 Risk per turn until file dies.', icon: 'Pill' },
  bogo_free:       { name: 'BOGO Anomaly',     intent: 'risk_up',     value: 12,   desc: 'Buy-one-get-one promotion doubles the rot. +12 Risk and amplifies a visible anomaly next turn.', icon: 'Layers' },
  legal_armor:     { name: 'Lawsuit Phase',    intent: 'block_self',  value: 18,   desc: 'Counter-suit posture. File gains 18 Block — the merchant lawyered up.', icon: 'Shield' },
  pillow_talk:     { name: 'Pillow Talk',      intent: 'rehide',      value: 1,    desc: 'Charm offensive. A revealed attribute slips back behind the curtain.', icon: 'EyeOff' },
};

// Pick which abilities a file has. Boiler-Room/Aggressive ISOs get more, bosses get more again.
function pickAbilitiesForFile(boss, isBoss) {
  const pool = ['stacking_surge', 'nsf_spike', 'forged_docs', 'broker_pressure', 'cash_crisis', 'hide_attribute'];
  // Tier-driven weighting: aggressive ISOs over-index on stacking + crisis abilities
  const weighted = pool.slice();
  if (boss.iso.tier === 'Aggressive' || boss.iso.tier === 'Boiler Room') weighted.push('stacking_surge', 'cash_crisis');
  if (boss.iso.tier === 'Premier' || boss.iso.tier === 'Standard') weighted.push('broker_pressure');
  const count = isBoss ? 3 : (boss.iso.tier === 'Boiler Room' ? 3 : boss.iso.tier === 'Aggressive' ? 2 : 1 + (Math.random() < 0.4 ? 1 : 0));
  const out = [];
  while (out.length < count && weighted.length) {
    const i = Math.floor(Math.random() * weighted.length);
    const id = weighted[i];
    if (!out.includes(id)) out.push(id);
    weighted.splice(i, 1);
  }
  return out;
}
function pickNextIntent(abilities) {
  if (!abilities.length) return null;
  return abilities[Math.floor(Math.random() * abilities.length)];
}

// Boss days fall on day 3, 6, 9 — escalating difficulty + reward beats. Day 10 is the FINAL boss.
const BOSS_DAYS = [3, 6, 9];
const FINAL_BOSS_DAY = 10;
const isBossDay = (day) => BOSS_DAYS.includes(day) || day === FINAL_BOSS_DAY;
const isFinalBossDay = (day) => day === FINAL_BOSS_DAY;

// Card damage derivation. Existing cards keep all their effects (reveal, mod, draw, bonus);
// damage is added on top so combat doesn't replace the existing risk/factor system.
function deriveCardDamage(card) {
  if (typeof card.damage === 'number') return card.damage;
  if (card.type === 'DECLINE') return 0;
  // Pure tempo/utility (just draw or bonus) chips slowly
  const isPureTempo = card.type === 'UTILITY' && !card.target && !card.mod;
  if (isPureTempo) return 3;
  // Energy-scaled: 0E → 4, 1E → 8, 2E → 14
  const eMap = { 0: 4, 1: 8, 2: 14 };
  let dmg = eMap[card.energy] ?? 8;
  // Reveals chip harder (info pressure)
  if (card.type === 'REVEAL') dmg += 4;
  // Modifiers with rate concession (factor < 0) chip more (real structural pressure)
  if (card.mod?.factor && card.mod.factor < 0) dmg += 4;
  return dmg;
}

// Card tier — derived from structure rather than tagged per-card. Drives boss/scam reward draft pools.
// rare: 2-energy power cards, signature-tier conditional/scaling effects, big perRevealedBonus
// uncommon: conditional mods, per-X scaling mods, draw+mod hybrids
// common: vanilla reveals, basic risk/factor mods, simple tempo
// === Run history (localStorage-backed) ===
// Persists a summary of every completed run for the Profile screen. Capped at 200 entries
// so localStorage stays manageable. Wrapped in try/catch for private-mode browsers.
const RUN_HISTORY_KEY = 'uw_run_history';
function loadRunHistory() {
  try {
    const raw = localStorage.getItem(RUN_HISTORY_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) { return []; }
}
function appendRunHistory(run) {
  try {
    const arr = loadRunHistory();
    arr.push(run);
    localStorage.setItem(RUN_HISTORY_KEY, JSON.stringify(arr.slice(-200)));
  } catch (e) {}
}
function clearRunHistory() {
  try { localStorage.removeItem(RUN_HISTORY_KEY); } catch (e) {}
}

function getCardTier(card) {
  if (!card) return 'common';
  if (card.energy >= 2) return 'rare';
  const m = card.mod || {};
  const hasScaling = m.perRevealedRisk || m.perRevealedFactor || m.perAnomalyRisk || m.perAnomalyFactor || m.perActiveModRisk || m.perActiveModFactor;
  const hasCondition = m.condition || m.condRisk || m.condFactor;
  if (hasScaling || hasCondition) return 'uncommon';
  if (card.perRevealedBonus || (card.bonus && card.bonus >= 200)) return 'uncommon';
  // Hybrid mods (both risk-trim and factor-pump) read as uncommon utility
  if (m.risk && m.factor && Math.abs(m.risk) >= 5 && Math.abs(m.factor) >= 0.02) return 'uncommon';
  // 2x-effect utility (mod + draw + val all set) feels uncommon
  if (card.draw && card.mod) return 'uncommon';
  return 'common';
}

// Block derivation — defensive cards (Tighten Up, Belt and Suspenders, Failsafe, etc.)
// add player Block on play. Block soaks the file's next attack.
function deriveCardBlock(card) {
  if (typeof card.block === 'number') return card.block;
  if (card.type !== 'MODIFIER') return 0;
  // Risk-trim modifiers double as block: roughly 1 block per 2 risk reduced (capped at 12)
  if (card.mod?.risk && card.mod.risk < 0) return Math.min(12, Math.floor(-card.mod.risk / 2));
  return 0;
}

// Boss flavor names for the day-3/6/9 escalation
const BOSS_FLAVORS = [
  'Distressed', 'Boiler Room', 'Fraud Ring', 'Cash-Crunch', 'Stack-Heavy', 'Litigation-Bound',
  'Defaulted Affiliate', 'Phantom Co.', 'Off-the-Books', 'Cross-Collateralized',
];

// Attach combat stats to a generated file. HP scales with day + industry complexity + ISO tier.
// Day 3/6/9 = mini-bosses (2.1× HP, 5 turns). Day 10 = final boss "Mike Lindel" (3.2× HP, 7 turns,
// hand-curated ability kit including infomercial-push HP regen and BOGO anomaly amp).
function attachCombatStats(file, day, isBoss) {
  const isFinal = isFinalBossDay(day);
  const isoBump = file.iso.tier === 'Boiler Room' ? 18
                 : file.iso.tier === 'Aggressive' ? 10
                 : file.iso.tier === 'Standard'   ? 0
                 : -4;  // Premier files are tighter / less HP
  const baseHp = 45 + (day - 1) * 5 + Math.floor(file.industry.baseRisk / 2) + isoBump;
  let maxHp = Math.max(30, baseHp);
  let maxTurns = 3;
  // Risk threshold (StS Block model) — final risk above this = damage to Capital, scaled by advance.
  // Generous on Day 1, tighter on bosses, brutal on the final.
  let riskThreshold = isFinal ? 20
    : (file.isScam        ? 28
    : (file.isRenewalBoss ? 30
    : (isBoss             ? 32
    : (day === 1          ? 40
    :                       35))));
  let displayName = file.name;
  let abilities;
  if (isFinal) {
    maxHp = Math.floor(maxHp * 3.2);
    maxTurns = 7;
    displayName = 'The Pillow Tycoon — Sub-Prime Slumber Inc.';
    // Curated kit so the fight has identity: HP regen, DOT, anomaly amp, late-fight legal armor, charm cycle.
    abilities = ['infomercial_push', 'subprime_slumber', 'bogo_free', 'legal_armor', 'pillow_talk'];
  } else if (isBoss) {
    maxHp = Math.floor(maxHp * 2.1);
    maxTurns = 5;
    // Renewal bosses already have a thematic name (e.g. "Restaurant — Renewal Crisis #4231"); only
    // generic random bosses get the BOSS_FLAVORS prefix treatment.
    if (!file.isRenewalBoss) {
      const flavor = BOSS_FLAVORS[Math.floor(Math.random() * BOSS_FLAVORS.length)];
      displayName = `${flavor} ${file.industry.name} #${Math.floor(Math.random() * 9000 + 1000)}`;
    }
    abilities = pickAbilitiesForFile(file, true);
  } else {
    abilities = pickAbilitiesForFile(file, false);
  }
  // Background music slot — encounter useEffect reads this to pick the right track.
  // Final boss → its theme. Renewal bosses (end-of-day) get a deterministic per-day mapping
  // so each day has its own identity: Day 2→Boss 1, Day 3→Boss 2, ..., Day 6→Boss 5; Days 7-9
  // cycle back through 1-3. Scam mini-bosses get their own dedicated track later (left null so
  // they fall back to Day 1 ambience until that file lands). Plain files & day 1 → Day 1.
  let bgMusic = 'Day 1';
  if (isFinal) bgMusic = 'Final Boss Theme';
  else if (file.isRenewalBoss) bgMusic = 'Boss ' + (((day - 2) % 5) + 1);
  else if (file.isScam) bgMusic = null;
  return {
    ...file,
    name: displayName,
    isBoss: isBoss || isFinal,
    isFinalBoss: isFinal,
    hp: maxHp,
    maxHp,
    block: 0,
    abilities,
    intent: pickNextIntent(abilities),
    maxTurns,
    riskThreshold,
    bgMusic,
    activeStatuses: [], // for DOT effects like cash_crisis / subprime_slumber
  };
}

// === File generation ===

function generateBankProfile(industry, requested, day) {
  const monthlyRevenue = Math.floor(requested * (1 + Math.random() * 1.2));
  const adb = Math.floor(monthlyRevenue / (15 + Math.random() * 10));
  const nsfs = Math.floor(Math.random() * (industry.volMultiplier / 2)) + (day > 5 ? 1 : 0);
  return { monthlyRevenue, adb, nsfs };
}

function generateAnomalies(iso, position, industry, day) {
  // Each ISO tier and risk factor influences which anomalies appear.
  const possible = [];
  const r = Math.random;
  if (iso.tier === 'Boiler Room' || iso.tier === 'Aggressive') {
    if (r() < iso.fraudChance) possible.push('pass_through');
    if (r() < iso.fraudChance * 1.5) possible.push('undisclosed_mca');
    if (r() < 0.4) possible.push('multiple_mca');
  }
  if (position >= 2 && r() < 0.5) possible.push('multiple_mca');
  if (position >= 3 && r() < 0.7) possible.push('undisclosed_mca');
  if (r() < 0.3) possible.push('nsf_cluster');
  if (r() < 0.15) possible.push('eod_zero');
  if (industry.id === 'restaurant' && r() < 0.25) possible.push('declining_revenue');
  if (industry.id === 'trucking' && r() < 0.20) possible.push('large_cash_out');
  if (industry.id === 'construction' && r() < 0.18) possible.push('cross_collateral');
  if (r() < 0.10) possible.push('reversed_wire');
  if (day > 6 && r() < 0.15) possible.push('structuring');
  if (r() < 0.18) possible.push('round_deposits');
  // Dedupe
  return Array.from(new Set(possible)).slice(0, 4);
}

// === Renewal boss generator ===
// Pulls a random source from the run's cleared-deals history and applies deterioration:
// position bump (more concurrent funders since you funded), fresh anomaly, NSF spike,
// possible Chapter 11 filing, larger requested ticket. Returns a file already marked as
// a renewal-crisis boss with a deteriorations[] list for the UI to surface.
// Top-3 deterioration deltas for the Callback Panel. (Fix F2.) Returns sorted array of
// signed deltas with material flags — sign-coded color comes from the consumer.
function computeDeltas(callback, currentBoss) {
  if (!callback || !currentBoss) return [];
  const deltas = [];
  // Position drift (+ = worse position behind more debt)
  const origPos = callback.originalPosition || 1;
  const curPos = currentBoss.hidden?.position?.value || 1;
  if (curPos !== origPos) {
    deltas.push({
      label: 'UCC Position',
      delta: curPos - origPos,
      display: `${origPos === 1 ? '1st' : origPos === 2 ? '2nd' : origPos === 3 ? '3rd' : origPos + 'th'} → ${curPos === 1 ? '1st' : curPos === 2 ? '2nd' : curPos === 3 ? '3rd' : curPos + 'th'}`,
      worse: curPos > origPos,
      magnitude: Math.abs(curPos - origPos) * 25,
    });
  }
  // FICO band shift (compared by label since the band order matters)
  const ficoOrder = ['500-549', '550-599', '600-649', '650-699', '700-749', '750+'];
  const origFicoIdx = ficoOrder.indexOf(callback.originalFICO);
  const curFicoIdx = ficoOrder.indexOf(currentBoss.hidden?.fico?.label);
  if (origFicoIdx !== -1 && curFicoIdx !== -1 && origFicoIdx !== curFicoIdx) {
    deltas.push({
      label: 'FICO Band',
      delta: curFicoIdx - origFicoIdx,
      display: `${callback.originalFICO} → ${currentBoss.hidden.fico.label}`,
      worse: curFicoIdx < origFicoIdx,
      magnitude: Math.abs(curFicoIdx - origFicoIdx) * 18,
    });
  }
  // New anomalies since funding (count diff, listing top novel ones)
  const origAnomalies = new Set(callback.originalAnomalies || []);
  const curAnomalies = currentBoss.anomalies || [];
  const newOnes = curAnomalies.filter((a) => !origAnomalies.has(a));
  if (newOnes.length > 0) {
    const labels = newOnes.slice(0, 2).map((a) => ANOMALY_TYPES[a]?.label || a);
    const more = newOnes.length > 2 ? ` +${newOnes.length - 2}` : '';
    deltas.push({
      label: 'New Flags',
      delta: newOnes.length,
      display: labels.join(', ') + more,
      worse: true,
      magnitude: newOnes.length * 22,
    });
  }
  // NSF count delta — pull from current bank revealed only if visible, else stash as pending
  const origNSF = callback.originalNSFs || 0;
  const curNSF = currentBoss.hidden?.bank?.nsfs || 0;
  if (currentBoss.hidden?.bank?.revealed && curNSF !== origNSF) {
    deltas.push({
      label: 'NSF Count',
      delta: curNSF - origNSF,
      display: `${origNSF} → ${curNSF}`,
      worse: curNSF > origNSF,
      magnitude: Math.abs(curNSF - origNSF) * 6,
    });
  }
  // Bankruptcy escalation
  if (currentBoss.hasBankruptcy && !callback.hadBankruptcy) {
    deltas.push({
      label: 'Bankruptcy',
      delta: 1,
      display: 'Chapter 11 filed on principal',
      worse: true,
      magnitude: 50,
    });
  }
  // Sort by magnitude descending; consumers take top 3.
  deltas.sort((a, b) => b.magnitude - a.magnitude);
  return deltas;
}

function generateRenewalBoss(source, day) {
  const escalations = [];
  // Position bump — 60% +1, 25% +2 (cumulative)
  const oldPosVal = source.hidden.position.value;
  let newPosVal = oldPosVal;
  if (Math.random() < 0.60) newPosVal = Math.min(4, newPosVal + 1);
  if (Math.random() < 0.25) newPosVal = Math.min(4, newPosVal + 1);
  if (newPosVal > oldPosVal) {
    const lbl = (n) => n === 1 ? '1st' : n === 2 ? '2nd' : n === 3 ? '3rd' : n + 'th';
    escalations.push({ kind: 'position', label: `Position slipped to ${lbl(newPosVal)} (was ${source.hidden.position.label})` });
  }
  const positionRisk = newPosVal === 1 ? 0 : newPosVal === 2 ? 20 : newPosVal === 3 ? 40 : 55;

  // New deterioration anomalies — pulled from the existing pool
  const candidates = ['multiple_mca', 'undisclosed_mca', 'declining_revenue', 'eod_zero', 'nsf_cluster'];
  const newAnomalies = [...(source.anomalies || [])];
  let added = 0;
  while (added < 2 && Math.random() < 0.65) {
    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    if (!newAnomalies.includes(pick)) {
      newAnomalies.push(pick);
      escalations.push({ kind: 'anomaly', label: `New flag: ${ANOMALY_TYPES[pick]?.label || pick}` });
      added++;
    } else { added++; }
  }
  const anomalyRisk = newAnomalies.reduce((s, a) => s + (ANOMALY_TYPES[a]?.risk || 0), 0);

  // Fresh bank profile — worse NSFs, possibly thinner ADB
  const requested = Math.floor(source.requested * (1.5 + Math.random() * 0.6));
  const newBank = generateBankProfile(source.industry, requested, day);
  newBank.nsfs = newBank.nsfs + 2 + Math.floor(Math.random() * 3);
  if (Math.random() < 0.4) newBank.adb = Math.floor(newBank.adb * 0.7);
  const bankRisk = newBank.nsfs * 5 + (newBank.adb * 80 < requested ? 25 : 0);
  if (newBank.nsfs > (source.hidden.bank?.nsfs || 0) + 2) {
    escalations.push({ kind: 'bank', label: `NSF spike: ${newBank.nsfs} this period` });
  }

  // Chapter 11 / bankruptcy flag — heavy
  const hasBankruptcy = Math.random() < 0.18;
  if (hasBankruptcy) escalations.push({ kind: 'bk', label: 'Chapter 11 filing reported on principal' });

  // FICO slip — 35% chance to drop one band
  const ficoBands = [
    { label: '500-549', value: 'sub-prime', risk: 35 },
    { label: '550-599', value: 'deep sub',  risk: 22 },
    { label: '600-649', value: 'prime-2',   risk: 8  },
    { label: '650-699', value: 'prime-1',   risk: -5 },
    { label: '700-749', value: 'prime',     risk: -15 },
    { label: '750+',    value: 'super',     risk: -30 },
  ];
  let fico = source.hidden.fico;
  if (Math.random() < 0.35) {
    const idx = ficoBands.findIndex((b) => b.label === source.hidden.fico.label);
    if (idx > 0) {
      fico = { ...ficoBands[idx - 1], revealed: true };
      escalations.push({ kind: 'fico', label: `FICO slipped: ${fico.label} (was ${source.hidden.fico.label})` });
    }
  }

  const baseRisk = source.industry.baseRisk + dayDifficulty(day) + source.state.riskMod + source.iso.riskMod
    + fico.risk + source.hidden.tib.risk + positionRisk + bankRisk + (hasBankruptcy ? 35 : 0);

  const file = {
    uid: 'f_' + Math.random().toString(36).slice(2, 9),
    name: `${source.industry.name} — Renewal Crisis #${Math.floor(Math.random() * 9000 + 1000)}`,
    merchantName: source.merchantName || `${source.industry.name} Merchant`, // (Fix F2) carry forward the original merchant identity
    industry: source.industry,
    state: source.state,
    iso: source.iso,
    requested,
    isRenewal: true,
    isRenewalBoss: true,
    hasBankruptcy,
    deteriorations: escalations,
    sourceName: source.name,
    baseRiskBeforeAnomalies: baseRisk,
    actualBaseRisk: baseRisk + anomalyRisk,
    hidden: {
      fico:     { ...fico, revealed: true },
      tib:      { ...source.hidden.tib, revealed: true },
      position: { revealed: true, value: newPosVal,
                  label: newPosVal === 1 ? '1st' : newPosVal === 2 ? '2nd' : newPosVal === 3 ? '3rd' : newPosVal + 'th',
                  risk: positionRisk },
      bank:     { ...newBank, risk: bankRisk, revealed: false },
    },
    anomalies: newAnomalies,
    anomaliesRevealed: false,
    forgedDocs: false,
    // (Fix F2) Renewal callback snapshot — what the original deal looked like at funding.
    // Powers the CallbackPanel in the encounter HUD and the Renewal Verdict in the reveal land.
    callback: {
      merchantName: source.merchantName || `${source.industry.name} Merchant`,
      industryName: source.industry.name,
      dayCleared: source.dayCleared || null,
      originalAdvance: source.lastAdvance || source.requested || 0,
      originalFactor: source.lastFactor || 1.42,
      originalTermDays: source.originalTermDays || null,
      originalHoldbackPct: source.originalHoldbackPct || null,
      originalPosition: source.hidden?.position?.value ?? 1,
      originalFICO: source.hidden?.fico?.label ?? '—',
      originalTIB: source.hidden?.tib?.label ?? '—',
      originalAnomalies: [...(source.anomalies || [])],
      originalNSFs: source.hidden?.bank?.nsfs ?? 0,
      isoName: source.iso?.name || 'Unknown ISO',
      hadBankruptcy: !!source.hasBankruptcy,
      profitBooked: source.profitBooked || 0,
    },
  };
  return attachCombatStats(file, day, true);
}

// === Scam files (mini-boss event) ===
// A tipped-off fraud file that comes in optionally between days. Heavy hidden risk, forged docs,
// boiler-room source. Clearing one pays bonus commission and grants a guaranteed-rare draft.
// Players can also Decline to walk away clean.
function generateScamFile(day, clearedDeals) {
  const industry = INDUSTRIES[Math.floor(Math.random() * INDUSTRIES.length)];
  const state = STATES[Math.floor(Math.random() * STATES.length)];
  const iso = ISOS.find((x) => x.tier === 'Boiler Room') || ISOS.find((x) => x.tier === 'Aggressive') || ISOS[0];
  const requested = 30000 + Math.floor(Math.random() * 60000);
  // (Fix F2) Pull a deduplicated merchant name so scam tip-offs feel like specific operations,
  // not generic fraud silhouettes. The boiler-room aesthetic still lands with a real name.
  const usedNames = new Set((clearedDeals || []).map((d) => d.merchantName).filter(Boolean));
  const merchantName = pickMerchantName(industry, usedNames);

  // Force a sub-prime credit / thin TIB / 3rd position file — classic fraud-tip silhouette
  const fico = { label: '500-549', value: 'sub-prime', risk: 35 };
  const tib  = { label: '<1 yr',   value: 0.5,         risk: 35 };
  const positionVal = 3;
  const positionRisk = 40;

  const bank = generateBankProfile(industry, requested, day);
  bank.nsfs = bank.nsfs + 4 + Math.floor(Math.random() * 4);
  bank.adb  = Math.floor(bank.adb * 0.55);
  const bankRisk = bank.nsfs * 5 + (bank.adb * 80 < requested ? 25 : 0);

  // Heavy anomaly load — pull only from the high-weight fraud tags
  const fraudPool = ['undisclosed_mca', 'pass_through', 'structuring', 'multiple_mca', 'declining_revenue', 'eod_zero'];
  const anomalies = [];
  while (anomalies.length < 4) {
    const pick = fraudPool[Math.floor(Math.random() * fraudPool.length)];
    if (!anomalies.includes(pick)) anomalies.push(pick);
  }
  const anomalyRisk = anomalies.reduce((s, a) => s + (ANOMALY_TYPES[a]?.risk || 0), 0);

  const baseRisk = industry.baseRisk + dayDifficulty(day) + state.riskMod + iso.riskMod
    + fico.risk + tib.risk + positionRisk + bankRisk;

  const file = {
    uid: 'f_scam_' + Math.random().toString(36).slice(2, 9),
    name: `Suspicious Tip-off — ${industry.name}`,
    merchantName, // (Fix F2) named scam target
    industry, state, iso,
    requested,
    isRenewal: false,
    isScam: true,
    forgedDocs: true, // start with forged docs flag — anomalies hide until Forensic Review
    baseRiskBeforeAnomalies: baseRisk,
    actualBaseRisk: baseRisk + anomalyRisk,
    hidden: {
      fico:     { revealed: false, ...fico },
      tib:      { revealed: false, ...tib },
      position: { revealed: false, value: positionVal, label: '3rd', risk: positionRisk },
      bank:     { revealed: false, ...bank, risk: bankRisk },
    },
    anomalies,
    anomaliesRevealed: false,
  };
  return attachCombatStats(file, day, true);
}

function generateFile(day, lastClearedDeal, hasReloadDesk, forcedPremier, clearedDeals) {
  const onBossDay = isBossDay(day);
  const onFinalBossDay = isFinalBossDay(day);
  // Day 2-9: if you've cleared anything before, today's file is a renewal-boss of one of those merchants.
  // This makes every choice carry weight — the merchants you funded come back, deteriorated.
  if (!onFinalBossDay && day >= 2 && day <= 9 && clearedDeals && clearedDeals.length > 0) {
    const source = clearedDeals[Math.floor(Math.random() * clearedDeals.length)];
    return generateRenewalBoss(source, day);
  }
  // Otherwise fall through to the original renewal/random-fresh flow (handles day 1 and the no-clears edge case).
  const renewChance = hasReloadDesk ? 0.28 : 0.18;
  if (!onBossDay && lastClearedDeal && day >= 2 && Math.random() < renewChance) {
    const prev = lastClearedDeal;
    const requested = Math.floor(prev.requested * (1.4 + Math.random() * 0.6));
    // Track-record bonus applies to the *base* risk before new anomalies
    const renewalBase = Math.max(8, (prev.baseRiskBeforeAnomalies || prev.actualBaseRisk) - 20);
    const newBank = generateBankProfile(prev.industry, requested, day);
    const newBankRisk = newBank.nsfs * 5 + (newBank.adb * 80 < requested ? 25 : 0);
    const newAnomalies = generateAnomalies(prev.iso, prev.hidden.position.value, prev.industry, day);
    const newAnomalyRisk = newAnomalies.reduce((s, a) => s + ANOMALY_TYPES[a].risk, 0);
    const renewalFile = {
      ...prev,
      isRenewal: true,
      requested,
      baseRiskBeforeAnomalies: renewalBase,
      actualBaseRisk: renewalBase + newAnomalyRisk,
      hidden: {
        fico:     { ...prev.hidden.fico,     revealed: true  },
        tib:      { ...prev.hidden.tib,      revealed: true  },
        position: { ...prev.hidden.position, revealed: true  },
        bank:     { ...newBank, risk: newBankRisk, revealed: false },
      },
      anomalies: newAnomalies,
      anomaliesRevealed: false,
      forgedDocs: false,
      uid: 'f_' + Math.random().toString(36).slice(2, 9),
      // (Fix F2) Callback snapshot — same shape as in generateRenewalBoss so the encounter
      // CallbackPanel renders identically on the soft-renewal path.
      merchantName: prev.merchantName || `${prev.industry?.name || 'Merchant'}`,
      callback: {
        merchantName: prev.merchantName || `${prev.industry?.name || 'Merchant'}`,
        industryName: prev.industry?.name || 'Merchant',
        dayCleared: prev.dayCleared || null,
        originalAdvance: prev.lastAdvance || prev.requested || 0,
        originalFactor: prev.lastFactor || 1.42,
        originalTermDays: prev.originalTermDays || null,
        originalHoldbackPct: prev.originalHoldbackPct || null,
        originalPosition: prev.hidden?.position?.value ?? 1,
        originalFICO: prev.hidden?.fico?.label ?? '—',
        originalTIB: prev.hidden?.tib?.label ?? '—',
        originalAnomalies: [...(prev.anomalies || [])],
        originalNSFs: prev.hidden?.bank?.nsfs ?? 0,
        isoName: prev.iso?.name || 'Unknown ISO',
        hadBankruptcy: !!prev.hasBankruptcy,
        profitBooked: prev.profitBooked || 0,
      },
    };
    return attachCombatStats(renewalFile, day, false);
  }

  // Day 10 is locked to a Retail file (the pillow merchant) and a non-Premier ISO so the final
  // boss feels like the volume-retail subprime arc — bypasses forcedPremier on final-boss day.
  const industry = onFinalBossDay
    ? (INDUSTRIES.find((i) => i.id === 'retail') || INDUSTRIES[0])
    : INDUSTRIES[Math.floor(Math.random() * INDUSTRIES.length)];
  const state = STATES[Math.floor(Math.random() * STATES.length)];
  const iso = onFinalBossDay
    ? (ISOS.find((x) => x.tier === 'Aggressive') || ISOS[0])
    : forcedPremier
      ? ISOS.filter((x) => x.tier === 'Premier')[Math.floor(Math.random() * 2)]
      : ISOS[Math.floor(Math.random() * ISOS.length)];

  const requested = onFinalBossDay
    ? 90000 + Math.floor(Math.random() * 30000)  // boss file is a much bigger ticket
    : 8000 + Math.floor(Math.random() * (12000 + day * 4000));

  const ficoBands = [
    { label: '500-549', value: 'sub-prime', risk: 35 },
    { label: '550-599', value: 'deep sub',  risk: 22 },
    { label: '600-649', value: 'prime-2',   risk: 8  },
    { label: '650-699', value: 'prime-1',   risk: -5 },
    { label: '700-749', value: 'prime',     risk: -15 },
    { label: '750+',    value: 'super',     risk: -30 },
  ];
  const fico = ficoBands[Math.floor(Math.random() * ficoBands.length)];

  const tibBands = [
    { label: '<1 yr',    value: 0.5, risk: 35 },
    { label: '1-2 yrs',  value: 1.5, risk: 18 },
    { label: '2-4 yrs',  value: 3,   risk: 0  },
    { label: '5-9 yrs',  value: 6,   risk: -8 },
    { label: '10+ yrs',  value: 12,  risk: -15 },
  ];
  const tib = tibBands[Math.floor(Math.random() * tibBands.length)];

  const positionVal = Math.random() < 0.45 ? 1 : Math.random() < 0.6 ? 2 : Math.random() < 0.5 ? 3 : 4;
  const positionRisk = positionVal === 1 ? 0 : positionVal === 2 ? 20 : positionVal === 3 ? 40 : 55;

  const bank = generateBankProfile(industry, requested, day);
  const bankRisk = bank.nsfs * 5 + (bank.adb * 80 < requested ? 25 : 0);

  const anomalies = generateAnomalies(iso, positionVal, industry, day);
  const anomalyRisk = anomalies.reduce((s, a) => s + ANOMALY_TYPES[a].risk, 0);

  const baseRisk = industry.baseRisk + dayDifficulty(day) + state.riskMod + iso.riskMod
    + fico.risk + tib.risk + positionRisk + bankRisk;

  // (Fix F2) Pull a deduplicated merchant name. Day 10 final boss has its own identity
  // ("The Pillow Tycoon — Sub-Prime Slumber Inc.") so we let that win when present.
  const usedNames = new Set((clearedDeals || []).map((d) => d.merchantName).filter(Boolean));
  const merchantName = onFinalBossDay
    ? 'The Pillow Tycoon — Sub-Prime Slumber Inc.'
    : pickMerchantName(industry, usedNames);

  const baseFile = {
    uid: 'f_' + Math.random().toString(36).slice(2, 9),
    name: industry.name + ' #' + Math.floor(Math.random() * 9000 + 1000),
    merchantName, // (Fix F2)
    industry, state, iso,
    requested,
    isRenewal: false,
    baseRiskBeforeAnomalies: baseRisk,
    actualBaseRisk: baseRisk + anomalyRisk,
    hidden: {
      fico:     { revealed: false, ...fico },
      tib:      { revealed: false, ...tib },
      position: { revealed: false, value: positionVal, label: positionVal === 1 ? '1st' : positionVal === 2 ? '2nd' : positionVal === 3 ? '3rd' : positionVal + 'th', risk: positionRisk },
      bank:     { revealed: false, ...bank, risk: bankRisk },
    },
    anomalies,
    anomaliesRevealed: false,
  };
  return attachCombatStats(baseFile, day, onBossDay);
}

                  <div className="text-sm font-mono font-bold text-neutral-200">{formatMoney(monthRev)}</div>
                  <div className="text-[10px] text-neutral-500 mt-0.5">Deposits</div>
                  <div className="text-xs font-mono mt-2 text-amber-400">{monthNsf} NSF{monthNsf !== 1 ? 's' : ''}</div>
                </div>
              );
            })}
          </div>

          <div className="grid grid-cols-2 gap-2 pt-2 border-t border-neutral-800">
            <div className="bg-neutral-950 border border-neutral-800 rounded p-3">
              <div className="text-[10px] uppercase tracking-widest text-neutral-500">Avg Daily Balance</div>
              <div className="text-base font-mono font-bold text-neutral-200">{formatMoney(bank.adb)}</div>
            </div>
            <div className="bg-neutral-950 border border-neutral-800 rounded p-3">
              <div className="text-[10px] uppercase tracking-widest text-neutral-500">Total NSFs (3mo)</div>
              <div className="text-base font-mono font-bold text-amber-400">{bank.nsfs}</div>
            </div>
          </div>

          {/* Inferred concurrent-MCA drag — only meaningful once UCC position is revealed */}
          {boss.hidden.position.revealed && boss.hidden.position.value >= 2 && (
            <div className="pt-2 border-t border-neutral-800">
              <div className="text-[10px] uppercase tracking-widest text-amber-400 font-black mb-2 flex items-center gap-2">
                <Layers size={12} /> Concurrent MCA Drag
              </div>
              {(() => {
                const positionVal = boss.hidden.position.value;
                const monthlyRev = bank.monthlyRevenue;
                const existingMonthly = estimateExistingMonthlyDebit(positionVal, monthlyRev);
                const dragPct = monthlyRev > 0 ? (existingMonthly / monthlyRev * 100).toFixed(1) : '0.0';
                return (
                  <div className="bg-amber-950/15 border border-amber-900/40 rounded p-3 text-[11px] leading-snug">
                    <div className="flex justify-between items-baseline mb-1">
                      <span className="text-neutral-300">Inferred existing daily ACH pulls (positions 1 to {positionVal - 1}):</span>
                      <span className="font-mono font-bold text-amber-300">~{formatMoney(existingMonthly)}/mo</span>
                    </div>
                    <div className="flex justify-between items-baseline">
                      <span className="text-neutral-500">Implied debt service load:</span>
                      <span className="font-mono text-amber-300">{dragPct}% of monthly revenue</span>
                    </div>
                    <p className="text-[10px] text-neutral-500 mt-2 italic">
                      Real desks read this off the bank statements by clustering recurring debits against known funder ACH descriptors. Game uses position as a proxy.
                    </p>
                  </div>
                );
              })()}
            </div>
          )}

          {/* Forensic anomalies */}
          <div className="pt-2 border-t border-neutral-800">
            <div className="text-[10px] uppercase tracking-widest text-purple-400 font-black mb-2 flex items-center gap-2">
              <Search size={12} /> Forensic Anomalies
            </div>
            {anomalies.length === 0 && (
              <div className="text-xs text-emerald-400 font-mono p-2 bg-emerald-950/20 border border-emerald-900/40 rounded">
                ✓ No anomalies detected. File reads clean.
              </div>
            )}
            {anomalies.length > 0 && !anomaliesVisible && !topAnomaly && (
              <div className="text-xs text-neutral-500 font-mono p-2 bg-neutral-950 border border-neutral-800 rounded">
                {anomalies.length} flag{anomalies.length !== 1 ? 's' : ''} present. Run Forensic Review to inspect.
              </div>
            )}
            {anomalies.map((aId) => {
              const a = ANOMALY_TYPES[aId];
              const visible = anomaliesVisible || (topAnomaly && aId === anomalies[0]);
              if (!visible) return null;
              return (
                <div key={aId} className="bg-red-950/20 border border-red-900/40 rounded p-3 mb-2 flex gap-3">
                  <a.icon className="text-red-400 mt-0.5 shrink-0" size={16} />
                  <div className="flex-1">
                    <div className="flex items-center justify-between">
                      <span className="font-bold text-red-300 text-xs uppercase tracking-widest">{a.label}</span>
                      <span className="font-mono text-red-400 text-[11px] font-bold">+{a.risk} risk</span>
                    </div>
                    <p className="text-[11px] text-neutral-400 mt-1 leading-snug">{a.desc}</p>
                  </div>
                </div>
              );
            })}
            {anomalies.length > 0 && !anomaliesVisible && topAnomaly && (
              <div className="text-[11px] text-neutral-500 italic mt-2">
                Forensic Eye revealed top flag only. Forensic Review card or full inspection needed for the rest.
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

          <div className="bg-neutral-950 rounded-lg border border-neutral-800 p-3">

              <span className="text-neutral-500">TIB</span>

              <span className="text-neutral-200 text-right truncate">{cb.isoName}</span>
