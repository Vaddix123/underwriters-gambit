function TermSheetPanel({ boss, params, setParams, activeMods, relics, capital, baseRiskBreakdown, selectedUnderwriter, cardsPlayedThisTurn }) {
  const [showBreakdown, setShowBreakdown] = useState(false);
  const factorCap = boss.state.factorCap;
  const baseRiskAccrued = baseRiskBreakdown.reduce((s, p) => s + p.value, 0);

  // Card-based modifiers from played cards this encounter (handles conditional + scaling)
  const ctx = {
    boss,
    factorVal: params.factor,
    revealedCount: countRevealed(boss),
    anomalyCount: countAnomaliesVisible(boss),
    modCount: activeMods.length,
  };
  const cardModParts = evaluateModsBreakdown(activeMods, ctx);
  const cardRisk   = cardModParts.reduce((s, p) => s + p.risk, 0);
  const cardFactor = cardModParts.reduce((s, p) => s + p.factor, 0);

  // Slider-based modifiers (broken out so the breakdown can show each lever)
  const sliderParts = [
    { label: `Advance ${Math.round(params.advancePct * 100)}%`, value: advanceRiskFn(params.advancePct) },
    { label: `Term ${params.termDays}d`,                         value: termRiskFn(params.termDays)    },
    { label: `Holdback ${Math.round(params.holdbackPct * 100)}%`, value: holdbackRiskFn(params.holdbackPct) },
    { label: `Factor ${params.factor.toFixed(2)}`,                value: factorRiskFn(params.factor) },
  ];
  const sliderRisk = sliderParts.reduce((s, p) => s + p.value, 0);

  // Relic effects (broken out per relic so the breakdown can show each)
  const relicParts = [];
  let relicFactor = 0;
  if (relics.includes('r_calc'))       relicFactor += activeMods.length * 0.02;
  if (relics.includes('r_golf') && params.advancePct <= 0.50) relicFactor += 0.04;
  if (relics.includes('r_compliance') && params.factor >= 1.47) relicParts.push({ label: 'Relic: Compliance Officer', value: -10 });
  if (relics.includes('r_lawyer')) relicParts.push({ label: 'Relic: House Lawyer', value: -10 });
  const relicRisk = relicParts.reduce((s, p) => s + p.value, 0);

  // Underwriting vitals (only meaningful once bank is revealed) — these mirror real platform math.
  const bankRevealed = boss.hidden.bank.revealed;
  const monthlyRev = bankRevealed ? boss.hidden.bank.monthlyRevenue : 0;
  const avgDailyRev = monthlyRev / 30.42;
  const positionVal = boss.hidden.position.revealed ? boss.hidden.position.value : 1;
  const existingMonthly = bankRevealed ? estimateExistingMonthlyDebit(positionVal, monthlyRev) : 0;
  const advance = Math.floor(boss.requested * params.advancePct);

  // Final factor (clamped to state cap before applying relic bonuses... actually relic bonus over cap is fine here)
  const finalFactor = clampFactor(params.factor + cardFactor + relicFactor, boss.state);
  const payback = Math.floor(advance * finalFactor);
  const profit  = payback - advance;
  const dailyDebit = params.termDays > 0 ? Math.floor(payback / params.termDays) : 0;
  const apr = ((finalFactor - 1) / params.termDays) * 365 * 100;

  // New monthly debit equivalent for leverage math (daily × 30.42 ≈ monthly)
  const newMonthly = dailyDebit * 30.42;
  const totalMonthlyDebit = existingMonthly + newMonthly;
  const leverageRatio = monthlyRev > 0 ? totalMonthlyDebit / monthlyRev : 0;
  const leverageCap = leverageCapForTerm(params.termDays);
  const leverageOver = Math.max(0, leverageRatio - leverageCap);
  // Holdback ceiling: daily debit shouldn't exceed daily revenue × holdback %.
  const holdbackCeiling = avgDailyRev * params.holdbackPct;
  const overPull = bankRevealed && holdbackCeiling > 0 && dailyDebit > holdbackCeiling
    ? (dailyDebit - holdbackCeiling) / holdbackCeiling : 0;

  // Soft penalties — only apply when bank is revealed (player can see and react).
  const vitalsParts = [];
  if (bankRevealed && leverageOver > 0) {
    // +5 risk per percentage point over the leverage cap, capped at +30
    const pen = Math.min(30, Math.round(leverageOver * 100 * 5));
    vitalsParts.push({ label: `Over-leverage (+${(leverageOver * 100).toFixed(1)}pp over ${(leverageCap * 100).toFixed(0)}% cap)`, value: pen });
  }
  if (bankRevealed && overPull > 0) {
    // +12 risk if daily debit exceeds holdback ceiling, scaled by how much over
    const pen = Math.min(20, 12 + Math.round(overPull * 8));
    vitalsParts.push({ label: `Over-pull (daily debit > holdback ceiling)`, value: pen });
  }
  // HP penalty — funding a file you haven't finished reading is risky. Mirrors executeOffer.
  if (boss.maxHp && boss.hp > 0) {
    const pen = Math.round((boss.hp / boss.maxHp) * (boss.isBoss ? 35 : 25));
    if (pen > 0) vitalsParts.push({ label: `Unread file penalty (HP ${boss.hp}/${boss.maxHp})`, value: pen });
  }
  // Chain (Alexander): every card past the 3rd played this turn shaves risk off the final read.
  if (selectedUnderwriter === 'alexander' && cardsPlayedThisTurn >= 3) {
    const bonus = (cardsPlayedThisTurn - 2) * -3;
    vitalsParts.push({ label: `Chain bonus (${cardsPlayedThisTurn} cards played)`, value: bonus });
  }
  // Hedge (Branden): hybrid mods (both risk-trim AND factor adjustment) get an extra −3 Risk each.
  if (selectedUnderwriter === 'branden') {
    const hedgeMods = activeMods.filter((m) => m.risk && m.risk < 0 && m.factor);
    if (hedgeMods.length > 0) {
      vitalsParts.push({ label: `Hedge bonus (×${hedgeMods.length} hybrid mods)`, value: hedgeMods.length * -3 });
    }
  }
  const vitalsRisk = vitalsParts.reduce((s, p) => s + p.value, 0);

  // Visible risk = everything the player can see and account for
  const visibleRisk = Math.max(0, Math.min(99, Math.round(
    baseRiskAccrued + cardRisk + sliderRisk + relicRisk + vitalsRisk
  )));

  const adjust = (key, dir) => {
    setParams((p) => {
      const b = OFFER_BOUNDS[key];
      let next = p[key] + dir * b.step;
      next = Math.max(b.min, Math.min(b.max, next));
      // Round to step precision to avoid float drift
      next = Math.round(next / b.step) * b.step;
      next = parseFloat(next.toFixed(2));
      return { ...p, [key]: next };
    });
  };

  const adv = params.advancePct, term = params.termDays, hb = params.holdbackPct, f = params.factor;
  const factorAtCap = f >= factorCap - 0.001;

  const aprColor = apr > 200 ? 'text-red-400' : apr > 120 ? 'text-amber-400' : 'text-emerald-400';
  const riskColor = visibleRisk >= 50 ? 'text-red-400' : visibleRisk >= 30 ? 'text-amber-400' : 'text-emerald-400';

  return (
    <div className="bg-neutral-900 border border-neutral-700 rounded-xl p-3 sm:p-4">
      <div className="flex items-center justify-between mb-2">
        <div className="text-[11px] uppercase tracking-widest text-neutral-400 font-black flex items-center gap-2">
          <Settings2 size={13} className="text-emerald-500" /> Term Sheet
        </div>
        <div className="text-[10px] uppercase tracking-widest text-neutral-500">
          State Cap: <span className="font-mono font-bold text-neutral-300">{factorCap.toFixed(2)}</span>
        </div>
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-0">
        <ParamRow
          label="Advance"
          displayValue={`${Math.round(adv * 100)}%`}
          sub={formatMoney(advance)}
          onMinus={() => adjust('advancePct', -1)}
          onPlus={() => adjust('advancePct', +1)}
          minDisabled={adv <= OFFER_BOUNDS.advancePct.min + 0.001}
          maxDisabled={adv >= OFFER_BOUNDS.advancePct.max - 0.001}
        />
        <ParamRow
          label="Term"
          displayValue={`${term} days`}
          sub={`~${(term / 30).toFixed(1)} mo`}
          onMinus={() => adjust('termDays', -1)}
          onPlus={() => adjust('termDays', +1)}
          minDisabled={term <= OFFER_BOUNDS.termDays.min}
          maxDisabled={term >= OFFER_BOUNDS.termDays.max}
        />
        <ParamRow
          label="Holdback"
          displayValue={`${(hb * 100).toFixed(0)}%`}
          sub={hb >= 0.10 && hb <= 0.16 ? 'sweet spot' : hb < 0.08 ? 'too lax' : hb > 0.20 ? 'too aggressive' : 'ok'}
          onMinus={() => adjust('holdbackPct', -1)}
          onPlus={() => adjust('holdbackPct', +1)}
          minDisabled={hb <= OFFER_BOUNDS.holdbackPct.min + 0.001}
          maxDisabled={hb >= OFFER_BOUNDS.holdbackPct.max - 0.001}
          color={hb >= 0.10 && hb <= 0.16 ? 'text-emerald-300' : hb > 0.20 || hb < 0.08 ? 'text-amber-300' : 'text-neutral-100'}
        />
        <ParamRow
          label="Factor"
          displayValue={f.toFixed(2)}
          sub={factorAtCap ? `at ${boss.state.code} cap` : ''}
          onMinus={() => adjust('factor', -1)}
          onPlus={() => adjust('factor', +1)}
          minDisabled={f <= OFFER_BOUNDS.factor.min + 0.001}
          maxDisabled={f >= factorCap - 0.001}
          color={factorAtCap ? 'text-amber-300' : 'text-neutral-100'}
        />
      </div>

      <div className="grid grid-cols-2 sm:grid-cols-5 gap-1.5 mt-3 pt-3 border-t border-neutral-800">
        <PreviewStat label="Payback"   value={formatMoney(payback)} />
        <PreviewStat label="Profit"    value={formatMoney(profit)}    valueColor="text-emerald-400" />
        <PreviewStat label="Daily Pmt" value={formatMoney(dailyDebit)} />
        <PreviewStat label="Est APR"   value={`${Math.round(apr)}%`}   valueColor={aprColor} />
        {(() => {
          // Risk-as-damage preview (StS Block). Above-threshold risk = projected Capital damage.
          // The number IS the math — every point of mitigation is one point off the damage roll.
          const threshold = boss.riskThreshold || 35;
          const riskOver = Math.max(0, visibleRisk - threshold);
          const projectedDamage = riskOver > 0 ? Math.floor((riskOver / 100) * advance) : 0;
          const tone = riskOver === 0    ? 'emerald'
                      : riskOver <= 15   ? 'emerald'
                      : riskOver <= 30   ? 'amber'
                      :                    'red';
          const toneText   = tone === 'emerald' ? 'text-emerald-400' : tone === 'amber' ? 'text-amber-400' : 'text-red-400';
          const toneBorder = tone === 'emerald' ? 'border-emerald-900/50' : tone === 'amber' ? 'border-amber-900/50' : 'border-red-900/50';
          return (
            <button
              onClick={() => setShowBreakdown((s) => !s)}
              className={`bg-neutral-950/60 px-2 py-1.5 rounded border ${toneBorder} text-left hover:border-neutral-600 transition-colors`}
              title={`Risk above the file's threshold becomes Capital damage on submit. Mitigation is real — every point shaved is one point off the damage. Click for breakdown.`}
            >
              <div className="text-[9px] uppercase tracking-widest text-neutral-500 font-bold leading-tight flex items-center gap-1">
                Risk / Thresh <Info size={9} className="opacity-60" />
              </div>
              <div className="flex items-baseline gap-1 mt-0.5">
                <span className={`text-sm font-mono font-bold leading-tight ${riskColor}`}>{visibleRisk}</span>
                <span className="text-[10px] font-mono text-neutral-500">/{threshold}</span>
              </div>
              <div className={`text-[10px] font-bold leading-tight ${toneText}`}>
                {riskOver === 0 ? 'CLEAN' : `−${formatMoney(projectedDamage)}`}
              </div>
            </button>
          );
        })()}
      </div>

      {/* Underwriting Vitals — only visible after Bank reveal. Mirrors what a real desk computes. */}
      {bankRevealed && (
        <div className="mt-3 pt-3 border-t border-neutral-800">
          <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-black mb-1.5 flex items-center gap-1.5">
            <Activity size={11} className="text-emerald-500" /> Underwriting Vitals
          </div>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-1.5">
            <PreviewStat label="Monthly Rev" value={formatMoney(monthlyRev)} />
            <PreviewStat label="Existing Pulls" value={formatMoney(existingMonthly)}
              valueColor={existingMonthly > 0 ? 'text-amber-400' : 'text-neutral-400'} />
            <PreviewStat label={`Leverage / Cap ${(leverageCap * 100).toFixed(0)}%`}
              value={`${(leverageRatio * 100).toFixed(0)}%`}
              valueColor={leverageOver > 0 ? 'text-red-400' : leverageRatio > leverageCap * 0.85 ? 'text-amber-400' : 'text-emerald-400'} />
            <PreviewStat label="HB Ceiling / Day"
              value={`${formatMoney(holdbackCeiling)} / ${formatMoney(dailyDebit)}`}
              valueColor={overPull > 0 ? 'text-red-400' : 'text-neutral-300'} />
          </div>
          {(leverageOver > 0 || overPull > 0) && (
            <div className="mt-2 text-[10px] font-mono text-red-300 bg-red-950/20 border border-red-900/40 rounded px-2 py-1.5 leading-snug">
              {leverageOver > 0 && (
                <div>⚠ Over-leverage by {(leverageOver * 100).toFixed(1)}pp — total monthly debit exceeds the {(leverageCap * 100).toFixed(0)}% cap for this term band. Files cratering under stack pressure.</div>
              )}
              {overPull > 0 && (
                <div>⚠ Daily debit exceeds the holdback ceiling — contract is asking for more than {Math.round(params.holdbackPct * 100)}% of daily revenue can support.</div>
              )}
            </div>
          )}
        </div>
      )}

      {/* Click-to-expand risk breakdown */}
      {showBreakdown && (
        <div className="mt-3 pt-3 border-t border-neutral-800">
          <div className="text-[10px] uppercase tracking-widest text-neutral-500 font-black mb-2 flex items-center justify-between">
            <span className="flex items-center gap-1.5"><BarChart3 size={11} className="text-blue-400" /> Risk Breakdown</span>
            <span className="text-neutral-400 font-mono">Total: {visibleRisk}%</span>
          </div>
          <div className="space-y-0.5 text-[11px] font-mono max-h-64 overflow-y-auto scrollbar-thin pr-1">
            {[
              ...baseRiskBreakdown,
              ...sliderParts.map((p) => ({ ...p, label: 'Lever: ' + p.label })),
              ...cardModParts.map((p) => ({ label: 'Card: ' + p.name, value: p.risk })).filter((p) => p.value !== 0),
              ...relicParts,
              ...vitalsParts,
            ].filter((p) => p && p.value !== undefined).map((p, i) => {
              const cls = p.value > 0 ? 'text-red-400' : p.value < 0 ? 'text-emerald-400' : 'text-neutral-500';
              const sign = p.value > 0 ? '+' : '';
              return (
                <div key={i} className="flex justify-between py-0.5 border-b border-neutral-900 last:border-0">
                  <span className="text-neutral-300 truncate pr-2">{p.label}</span>
                  <span className={`shrink-0 ${cls}`}>{sign}{p.value}</span>
                </div>
              );
            })}
          </div>
          <div className="text-[10px] text-neutral-500 italic mt-2 leading-snug">
            Industry volatility (±{boss.industry.volMultiplier}) and any unrevealed file attributes are not in this breakdown — they're the hidden true risk that resolves at submit.
          </div>
        </div>
      )}

      {capital < advance && (
        <div className="mt-2 text-[11px] font-mono text-amber-400 bg-amber-950/20 border border-amber-900/40 rounded px-2 py-1">
          ⚠ Insufficient capital: need {formatMoney(advance)}, have {formatMoney(capital)}.
        </div>
      )}
    </div>
  );
}

// ============================================================================
// MAIN COMPONENT
// ============================================================================

function UnderwritersGambit() {
  const [gameState, setGameState] = useState('MENU');
  const [day, setDay] = useState(0);
  const [capital, setCapital] = useState(0);
  const [commission, setCommission] = useState(0);

  const [deck, setDeck] = useState([]);
  const [drawPile, setDrawPile] = useState([]);
  const [hand, setHand] = useState([]);
  const [discardPile, setDiscardPile] = useState([]);
  const [energy, setEnergy] = useState(0);

  const [relics, setRelics] = useState([]);
  const [consumables, setConsumables] = useState([]);
  const [pendingConsumables, setPendingConsumables] = useState([]);

  const [boss, setBoss] = useState(null);
  const [activeMods, setActiveMods] = useState([]);
  const [lastClearedDeal, setLastClearedDeal] = useState(null);
  // Full history of cleared deals — drives the day-2-through-9 renewal-boss pool.
  // Every cleared deal is pushed; renewal bosses pick a random source from this list and apply deterioration.
  const [clearedDeals, setClearedDeals] = useState([]);
  // Optional scam-file mini-boss — rolled at intermission, surfaces an Investigate button.
  const [scamFileAvailable, setScamFileAvailable] = useState(false);
  // Per-run counters surfaced on the Profile screen after a run ends.
  const [runStats, setRunStats] = useState({ cleared: 0, defaulted: 0, declined: 0 });
  // Walk keyword (Keith): a Decline stamps a Clean File buff onto the next encounter (-N Risk).
  // Carries through one encounter, applied + cleared in startEncounter.
  const [cleanFileBuff, setCleanFileBuff] = useState(0);
  // Chain keyword (Alexander): every card played in a turn raises the multiplier on the next
  // played mod. Tracked per-turn, reset on endTurn / new encounter.
  const [cardsPlayedThisTurn, setCardsPlayedThisTurn] = useState(0);

  // === RESOLUTION_REVEAL state (Fix F1 — Submit Reveal Sequence) ===
  // Drives the 3–4s reveal that fires between Submit and the existing RESOLUTION screen.
  // Replaces the instant-text-result drama hole noted in symptom 2/3/18.
  // revealQueue: ordered events the driver effect walks through with setTimeout.
  //   shape: [{ type: 'lock'|'card'|'anomaly'|'land', duration: ms, payload: {...} }, ...]
  // revealStep: index of the currently-visible event (incremented as the driver advances).
  // revealDone: true once the queue is exhausted and the player can advance to RESOLUTION.
  // revealSkipped: latch — single click during reveal jumps straight to landed state.
  // revealRiskNow: meter's currently-displayed risk score (animates on Phase 4 land).
  // pendingDelta / pendingClearedDeal: capital change + cleared-deal snapshot deferred from
  //   executeOffer until the reveal completes (or is skipped). Keeps the HUD's fund display
  //   from updating before the player sees the math arrive.
  const [revealQueue, setRevealQueue] = useState([]);
  const [revealStep, setRevealStep] = useState(0);
  const [revealDone, setRevealDone] = useState(false);
  const [revealSkipped, setRevealSkipped] = useState(false);
  const [revealRiskNow, setRevealRiskNow] = useState(0);
  const [pendingDelta, setPendingDelta] = useState(0);
  const [pendingClearedDeal, setPendingClearedDeal] = useState(null);
  const [revealFlashTrigger, setRevealFlashTrigger] = useState(0); // bumped to retrigger screen-flash CSS
  // Combat state — turn counter and player block. Block soaks the file's next attack and resets each turn.
  const [currentTurn, setCurrentTurn] = useState(1);
  const [playerBlock, setPlayerBlock] = useState(0);

  const [offerParams, setOfferParams] = useState({ ...DEFAULT_OFFER });

  const [shopRelics, setShopRelics] = useState([]);
  const [shopConsumables, setShopConsumables] = useState([]);
  const [shopkeeper, setShopkeeper] = useState(null);
  const [refreshUsed, setRefreshUsed] = useState(0);
  const [draftChoices, setDraftChoices] = useState([]);
  const [lastOutcome, setLastOutcome] = useState(null);

  const [showHelp, setShowHelp] = useState(false);
  const [showDeckPanel, setShowDeckPanel] = useState(false);
  const [showBank, setShowBank] = useState(false);
  const [inspectedCardId, setInspectedCardId] = useState(null);
  const [selectedUnderwriter, setSelectedUnderwriter] = useState(null);

  // Roll scam-file availability whenever we land on the intermission screen.
  // 30% from day 2 onward; cleared on commit so it doesn't carry stale into the next day.
  useEffect(() => {
    if (gameState !== 'INTERMISSION') return;
    setScamFileAvailable(day >= 2 && day < FINAL_BOSS_DAY && Math.random() < 0.30);
  }, [gameState, day]);

  // When a run ends, write a summary to localStorage for the Profile screen.
  // Guarded by selectedUnderwriter so the initial GAMEOVER from a fresh page (which shouldn't happen) doesn't write a phantom run.
  const runSavedRef = useRef(null);
  useEffect(() => {
    if (gameState !== 'GAMEOVER') return;
    if (!selectedUnderwriter) return;
    // Each run has a unique key; using day+commission+capital is enough to dedupe between strict-mode double-effects.
    const key = `${selectedUnderwriter}|${day}|${capital}|${commission}`;
    if (runSavedRef.current === key) return;
    runSavedRef.current = key;
    appendRunHistory({
      id: 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
      ts: Date.now(),
      underwriter: selectedUnderwriter,
      daysSurvived: day,
      finalCapital: capital,
      commission,
      outcome: (capital > 0 && day >= PROMOTION_DAY) ? 'promoted' : 'wiped',
      cleared: runStats.cleared,
      defaulted: runStats.defaulted,
      declined: runStats.declined,
      relics: relics.length,
      deckSize: deck.length,
    });
  }, [gameState, selectedUnderwriter, day, capital, commission, runStats, relics, deck]);

  // === Audio system ===
  // One imperatively-managed Audio element. Track is chosen by gameState; loops while on screen.
  // Browser autoplay rules require a user gesture; the unlock effect retries play() on first click/key.
  const audioRef = useRef(null);
  const [audioMuted, setAudioMuted] = useState(() => {
    try { return localStorage.getItem('uw_audio_muted') === '1'; } catch (e) { return false; }
  });
  const [audioVolume, setAudioVolume] = useState(() => {
    try { const v = parseFloat(localStorage.getItem('uw_audio_vol') || '0.5'); return isNaN(v) ? 0.5 : Math.max(0, Math.min(1, v)); }
    catch (e) { return 0.5; }
  });
  const [showVolSlider, setShowVolSlider] = useState(false);
  // Audio status surfaced to the UI so silent failures can be diagnosed without a debugger.
  // 'idle' | 'loading' | 'playing' | 'blocked' | 'error'
  const [audioStatus, setAudioStatus] = useState('idle');
  const [audioErrorMsg, setAudioErrorMsg] = useState('');
  const currentTrackRef = useRef(null);
  // Resolve the absolute base URL for assets/ once, cache it. CSS-probe is the most reliable
  // across iframe schemes (returns the same URL the visible background image uses); on real
  // HTTPS hosting `document.baseURI` works directly.
  const audioBaseRef = useRef(null);
  const getAudioBase = () => {
    if (audioBaseRef.current !== null) return audioBaseRef.current;
    let resolved = null;
    try {
      let probe = document.getElementById('__audioprobe');
      if (!probe) {
        probe = document.createElement('div');
        probe.id = '__audioprobe';
        probe.style.cssText = 'position:absolute;width:0;height:0;visibility:hidden;background-image:url(assets/Start.png);';
        document.body.appendChild(probe);
      }
      const cs = window.getComputedStyle(probe).backgroundImage || '';
      const m = cs.match(/url\(["']?([^"')]+)["']?\)/);
      if (m && /^https?:/i.test(m[1])) resolved = m[1].replace(/[^/]+(\?.*)?$/, '');
    } catch (e) {}
    if (!resolved) {
      try {
        if (document.baseURI && /^https?:/i.test(document.baseURI)) {
          resolved = new URL('assets/', document.baseURI).href;
        }
      } catch (e) {}
    }
    audioBaseRef.current = resolved || 'assets/';
    return audioBaseRef.current;
  };
  // Per-state music routing. ENCOUNTER picks up `boss.bgMusic` (set in attachCombatStats),
  // so a single fight always plays the same file across re-renders.
  const trackForGameState = (s, currentBoss) => {
    const base = getAudioBase();
    if (s === 'MENU')             return base + 'not-a-loan.mp3';
    if (s === 'CHARACTER_SELECT') return base + 'select-screen-2.mp3';
    if (s === 'INTERMISSION')     return base + encodeURI('Day 1.mp3');
    // Broker Row will eventually have its own track ('broker-row.mp3'); until that asset lands,
    // route to the intermission bed so the shop isn't dead silent.
    if (s === 'SHOP')             return base + encodeURI('Day 1.mp3');
    // RESOLUTION_REVEAL keeps the encounter bed playing — the sweep + stinger ride OVER it,
    // not under a different track. Same source as ENCOUNTER so audio doesn't restart mid-fight.
    if (s === 'RESOLUTION_REVEAL') {
      const name = (currentBoss && currentBoss.bgMusic) || 'Day 1';
      return base + encodeURI(name + '.mp3');
    }
    if (s === 'ENCOUNTER') {
      const name = (currentBoss && currentBoss.bgMusic) || 'Day 1';
      return base + encodeURI(name + '.mp3');
    }
    return null;
  };

  // === STINGER HOOKS (Fix F1 — forward-compatible with score brief tracks 11–15) ===
  // Stub until stinger-clean-clear.mp3, stinger-cleared.mp3, stinger-stressed.mp3,
  // stinger-default.mp3, stinger-collapse.mp3 ship from the audio brief. When they land,
  // implement getStingerForBand to return the URL and wire a transient <audio> element to play.
  const getStingerForBand = (bandName) => {
    // No-op until score-brief stingers exist in assets/. Returns null = stinger silent.
    // Map: { 'Clean Clear': 'stinger-clean-clear.mp3', ... }
    return null;
  };
  const playStinger = (bandName) => {
    const url = getStingerForBand(bandName);
    if (!url) return; // stub; no asset, no sound
    if (audioMuted) return;
    try {
      const a = new Audio(url);
      a.volume = audioVolume;
      a.play().catch(() => {});
    } catch (_) {}
  };

  // Global audio control was a speaker icon in the bottom-left of every screen — removed at
  // user request. Volume now lives only in the Options screen. Music autoplays on first user
  // gesture (the autoplay-unlock listener catches click / keydown / touchstart / pointerdown /
  // mousedown anywhere on the document).
  const globalAudioControlJsx = null;

  // === Game start ===
  // Pressing "Enter the Boiler Room" no longer starts the run — it goes to character select.
  // The underwriter pick determines starting deck composition AND the draft pool for the rest of the run.
  const startRun = () => {
    setCapital(STARTING_CAPITAL);
    setCommission(0);
    setDay(1);
    setDeck([]);
    setDrawPile([]);
    setHand([]);
    setDiscardPile([]);
    setRelics([]);
    setConsumables([]);
    setPendingConsumables([]);
    setLastClearedDeal(null);
    setClearedDeals([]);
    setRunStats({ cleared: 0, defaulted: 0, declined: 0 });
    setCleanFileBuff(0);
    setCardsPlayedThisTurn(0);
    setLastOutcome(null);
    setSelectedUnderwriter(null);
    setGameState('CHARACTER_SELECT');
  };

  // Locking in an underwriter builds the 9-card starting deck and enters Day 1 intermission.
  // Composition: 5 Push Rate + 3 Tighten Up + 1 class signature.
  const commitUnderwriter = (uw) => {
    const sig = SIGNATURE_CARDS.find((c) => c.id === uw.signatureId);
    const push   = BASIC_CARDS.find((c) => c.id === 'c_push');
    const tighten= BASIC_CARDS.find((c) => c.id === 'c_tighten');
    const startingDeck = [
      ...Array(5).fill(0).map((_, i) => ({ ...push,    uid: 'c_push_' + i })),
      ...Array(3).fill(0).map((_, i) => ({ ...tighten, uid: 'c_tighten_' + i })),
      { ...sig, uid: sig.id + '_0' },
    ];
    setDeck(startingDeck);
    setSelectedUnderwriter(uw.id);
    setGameState('INTERMISSION');
  };

  // === Encounter setup ===
  const startEncounter = (overrideFile) => {
    const hasReload = relics.includes('r_renewal');
    const forcedPremier = pendingConsumables.some((c) => c.id === 'k_premium');
    const newBoss = overrideFile || generateFile(day, lastClearedDeal, hasReload, forcedPremier, clearedDeals);

    // Apply consumables that affect this file
    let preActiveMods = [];
    let preEnergyBonus = 0;
    let forensicHidden = false;

    pendingConsumables.forEach((c) => {
      if (c.id === 'k_blacklist') preActiveMods.push({ name: 'Blacklist Tip', risk: -20, factor: 0 });
      if (c.id === 'k_stim') preEnergyBonus += 2;
      if (c.id === 'k_forged') forensicHidden = true;
    });
    if (forensicHidden) newBoss.forgedDocs = true;

    // Walk keyword: if a Clean File buff is queued (from a previous Decline), bake it directly
    // into the boss's risk so it shows in the breakdown and reduces final-risk identically.
    if (cleanFileBuff > 0 && newBoss) {
      newBoss.actualBaseRisk = (newBoss.actualBaseRisk || 0) - cleanFileBuff;
      newBoss.baseRiskBeforeAnomalies = (newBoss.baseRiskBeforeAnomalies || 0) - cleanFileBuff;
      newBoss.cleanFileApplied = cleanFileBuff;
      setCleanFileBuff(0);
    }
    setBoss(newBoss);
    setActiveMods(preActiveMods);
    setOfferParams({ ...DEFAULT_OFFER });
    setShowBank(false);
    setInspectedCardId(null);
    setPendingConsumables([]);
    setCurrentTurn(1);
    setPlayerBlock(0);
    setCardsPlayedThisTurn(0);

    // Energy & hand setup
    const baseEnergy = 3 + (relics.includes('r_intern') ? 1 : 0) + preEnergyBonus;
    setEnergy(baseEnergy);

    const drawCount = 4 + (relics.includes('r_rolodex') ? 1 : 0);
    const shuffled = shuffle(deck);
    setDrawPile(shuffled.slice(drawCount));
    setHand(shuffled.slice(0, drawCount));
    setDiscardPile([]);

    setGameState('ENCOUNTER');
  };

  // === Card play helpers ===

  // Determines whether a REVEAL/UTILITY card with a target can fire — used both by playCard
  // and by the UI to disable un-playable cards in hand.
  const canRevealTarget = (target) => {
    if (!boss) return false;
    if (Array.isArray(target)) return target.some((t) => canRevealTarget(t));
    if (target === 'forensic') return boss.hidden.bank.revealed && !boss.anomaliesRevealed;
    if (target === 'iso') return !boss.isoTierRevealed;
    if (target === 'random' || target === 'all_basic') {
      return ['fico','tib','position','bank'].some((k) => !boss.hidden[k].revealed);
    }
    return !boss.hidden[target].revealed;
  };

  // Apply a reveal effect (single / array / special keywords) to the boss state.
  // Operates on a single setBoss(b => ...) so multiple effects in one card stay atomic.
  const applyRevealToBoss = (b, target) => {
    if (Array.isArray(target)) return target.reduce((acc, t) => applyRevealToBoss(acc, t), b);
    if (target === 'forensic')   return { ...b, anomaliesRevealed: true, forgedDocs: false };
    if (target === 'iso')        return { ...b, isoTierRevealed: true };
    if (target === 'all_basic') {
      return { ...b, hidden: {
        fico:     { ...b.hidden.fico,     revealed: true },
        tib:      { ...b.hidden.tib,      revealed: true },
        position: { ...b.hidden.position, revealed: true },
        bank:     { ...b.hidden.bank,     revealed: true },
      }};
    }
    if (target === 'random') {
      const candidates = ['fico','tib','position','bank'].filter((k) => !b.hidden[k].revealed);
      if (!candidates.length) return b;
      const pick = candidates[Math.floor(Math.random() * candidates.length)];
      return { ...b, hidden: { ...b.hidden, [pick]: { ...b.hidden[pick], revealed: true } } };
    }
    return { ...b, hidden: { ...b.hidden, [target]: { ...b.hidden[target], revealed: true } } };
  };

  // Pull N cards from drawPile -> hand, reshuffling discard if drawPile runs dry.
  const drawIntoHand = (n) => {
    if (n <= 0) return;
    let pile = [...drawPile];
    let disc = [...discardPile];
    let drawn = [];
    for (let i = 0; i < n; i++) {
      if (pile.length === 0) {
        if (disc.length === 0) break;
        pile = shuffle(disc);
        disc = [];
      }
      drawn.push(pile.shift());
    }
    setDrawPile(pile);
    setDiscardPile(disc);
    setHand((h) => [...h, ...drawn]);
  };

  // === Card play ===
  const playCard = (idx) => {
    const card = hand[idx];
    if (!card || energy < card.energy) return;

    // Validate targeting for cards that need it
    if ((card.type === 'REVEAL' || card.target) && !canRevealTarget(card.target)) return;

    // DECLINE cards short-circuit the encounter — discard & spend energy, then trigger decline w/ bonus
    if (card.type === 'DECLINE') {
      setEnergy((e) => e - card.energy);
      executeDecline(card.bonus || 0);
      return;
    }

    // Discard the card and spend energy
    const newHand = hand.filter((_, i) => i !== idx);
    setHand(newHand);
    setDiscardPile((d) => [...d, card]);
    setEnergy((e) => e - card.energy);
    setCardsPlayedThisTurn((n) => n + 1);

    // Apply effects in order: reveals, modifiers, energy, draw, commission bonus, damage, block
    if (card.target) {
      setBoss((b) => applyRevealToBoss(b, card.target));
    }
    if (card.mod) {
      setActiveMods((m) => [...m, { name: card.name, ...card.mod }]);
    }
    if (card.val) {
      setEnergy((e) => e + card.val);
    }
    if (card.draw) {
      drawIntoHand(card.draw);
    }
    // Kickback (Stanley): all in-encounter commission income scales +50%
    const kickbackMult = selectedUnderwriter === 'stanley' ? 1.5 : 1;
    if (card.bonus) {
      setCommission((c) => c + Math.floor(card.bonus * kickbackMult));
    }
    if (card.perRevealedBonus) {
      // Note: this reads boss BEFORE any reveal this card may have applied (acceptable — reads at play time)
      setCommission((c) => c + Math.floor(card.perRevealedBonus * countRevealed(boss) * kickbackMult));
    }

    // Combat: damage to file, block buff to player. File block soaks damage first (StS-style).
    const dmg = deriveCardDamage(card);
    if (dmg > 0) {
      setBoss((b) => {
        if (!b) return b;
        const blockSoak = Math.min(b.block || 0, dmg);
        const remaining = dmg - blockSoak;
        return { ...b, block: (b.block || 0) - blockSoak, hp: Math.max(0, b.hp - remaining) };
      });
    }
    const blk = deriveCardBlock(card);
    if (blk > 0) setPlayerBlock((p) => p + blk);
  };

  // === End-of-turn handler ===
  // Resolves the file's telegraphed intent (its attack), applies DOTs, resets player block,
  // discards remaining hand, draws fresh, refreshes energy, and picks the file's next intent.
  // No-op if the file is at 0 HP (file is vetted; player should submit) or not in encounter.
  const endTurn = () => {
    if (!boss || gameState !== 'ENCOUNTER') return;
    const fileAlive = boss.hp > 0;

    // 1) File acts (only if alive)
    if (fileAlive && boss.intent) {
      const ability = FILE_ABILITIES[boss.intent];
      if (ability) {
        if (ability.intent === 'risk_up') {
          const blocked = Math.min(playerBlock, ability.value);
          const through = ability.value - blocked;
          if (through > 0) {
            setBoss((b) => ({ ...b, actualBaseRisk: (b.actualBaseRisk || 0) + through, baseRiskBeforeAnomalies: (b.baseRiskBeforeAnomalies || 0) + through }));
          }
        } else if (ability.intent === 'block_self') {
          setBoss((b) => ({ ...b, block: (b.block || 0) + ability.value }));
        } else if (ability.intent === 'factor_down') {
          setBoss((b) => ({ ...b, state: { ...b.state, factorCap: Math.max(1.20, b.state.factorCap - ability.value) } }));
        } else if (ability.intent === 'risk_dot') {
          setBoss((b) => ({ ...b, activeStatuses: [...(b.activeStatuses || []), { type: 'cash_crisis', value: ability.value }] }));
        } else if (ability.intent === 'rehide') {
          setBoss((b) => {
            const revealed = ['fico','tib','position','bank'].filter((k) => b.hidden[k].revealed);
            if (!revealed.length) return b;
            const pick = revealed[Math.floor(Math.random() * revealed.length)];
            return { ...b, hidden: { ...b.hidden, [pick]: { ...b.hidden[pick], revealed: false } } };
          });
        } else if (ability.intent === 'heal') {
          // Final boss: file regenerates HP, capped at maxHp (can't overheal)
          setBoss((b) => ({ ...b, hp: Math.min(b.maxHp, b.hp + ability.value) }));
        }
      }
    }

    // 2) Apply DOTs (cash crisis ticks up risk every turn until file dies)
    if (fileAlive) {
      setBoss((b) => {
        if (!b || !b.activeStatuses?.length) return b;
        const dot = b.activeStatuses.reduce((s, st) => s + (st.type === 'cash_crisis' ? st.value : 0), 0);
        return dot > 0 ? { ...b, actualBaseRisk: (b.actualBaseRisk || 0) + dot, baseRiskBeforeAnomalies: (b.baseRiskBeforeAnomalies || 0) + dot } : b;
      });
    }

    // 3) Pick next intent + reset file block (block doesn't carry between turns)
    setBoss((b) => b ? ({ ...b, intent: pickNextIntent(b.abilities), block: 0 }) : b);

    // 4) Reset player block, discard hand, redraw, reset energy + per-turn counters
    setPlayerBlock(0);
    setCardsPlayedThisTurn(0);
    setDiscardPile((d) => [...d, ...hand]);
    setHand([]);
    setCurrentTurn((t) => t + 1);
    setEnergy(3 + (relics.includes('r_intern') ? 1 : 0));
    const drawCount = 4 + (relics.includes('r_rolodex') ? 1 : 0);
    // Draw on next tick so the discard state has time to commit before drawIntoHand reads it
    setTimeout(() => drawIntoHand(drawCount), 0);
  };

  // === Decisions ===
  const executeDecline = (cardBonus = 0) => {
    const burnerBonus = relics.includes('r_burner') ? 300 : 0;
    let total = burnerBonus + cardBonus;
    // Kickback (Stanley): all commission income scales +50%, even on Decline
    if (selectedUnderwriter === 'stanley') total = Math.floor(total * 1.5);
    if (total) setCommission((c) => c + total);
    // Walk (Keith): Decline stamps a -15 Risk Clean File buff onto the next encounter
    if (selectedUnderwriter === 'keith') setCleanFileBuff(15);
    setRunStats((s) => ({ ...s, declined: s.declined + 1 }));
    const parts = [];
    if (cardBonus)   parts.push(`card +$${cardBonus}`);
    if (burnerBonus) parts.push(`burner +$${burnerBonus}`);
    setLastOutcome({
      type: 'DECLINE',
      profit: 0,
      msg: total
        ? `Declined. Side commission ${parts.join(', ')}.`
        : 'Declined. The file goes back to the broker. No exposure, no commission.',
      success: true,
    });
    endEncounter(0, null);
  };

  const executeOffer = () => {
    const ctx = {
      boss,
      factorVal: offerParams.factor,
      revealedCount: countRevealed(boss),
      anomalyCount: countAnomaliesVisible(boss),
      modCount: activeMods.length,
    };
    const { risk: cardRisk, factor: cardFactor } = evaluateMods(activeMods, ctx);

    const sliderRisk = advanceRiskFn(offerParams.advancePct) + termRiskFn(offerParams.termDays)
      + holdbackRiskFn(offerParams.holdbackPct) + factorRiskFn(offerParams.factor);

    let relicFactor = 0, relicRisk = 0;
    if (relics.includes('r_calc')) relicFactor += activeMods.length * 0.02;
    if (relics.includes('r_compliance') && offerParams.factor >= 1.47) relicRisk -= 10;
    if (relics.includes('r_golf') && offerParams.advancePct <= 0.50) relicFactor += 0.04;
    if (relics.includes('r_lawyer')) relicRisk -= 10;

    const finalFactor = clampFactor(offerParams.factor + cardFactor + relicFactor, boss.state);
    const advance = Math.floor(boss.requested * offerParams.advancePct);

    if (capital < advance) {
      setLastOutcome({
        type: 'BLOCKED',
        profit: 0,
        msg: `Insufficient capital — you need ${formatMoney(advance)} to fund this offer.`,
        success: true,
        blocked: true,
      });
      setGameState('RESOLUTION');
      return;
    }

    // Underwriting vitals penalties — mirror what TermSheetPanel showed the player
    let vitalsRisk = 0;
    if (boss.hidden.bank.revealed) {
      const monthlyRev = boss.hidden.bank.monthlyRevenue || 0;
      const positionVal = boss.hidden.position.revealed ? boss.hidden.position.value : 1;
      const existingMonthly = estimateExistingMonthlyDebit(positionVal, monthlyRev);
      const paybackVit = Math.floor(advance * finalFactor);
      const dailyDebit = offerParams.termDays > 0 ? Math.floor(paybackVit / offerParams.termDays) : 0;
      const newMonthly = dailyDebit * 30.42;
      const leverageRatio = monthlyRev > 0 ? (existingMonthly + newMonthly) / monthlyRev : 0;
      const leverageOver = Math.max(0, leverageRatio - leverageCapForTerm(offerParams.termDays));
      const avgDailyRev = monthlyRev / 30.42;
      const holdbackCeiling = avgDailyRev * offerParams.holdbackPct;
      const overPull = holdbackCeiling > 0 && dailyDebit > holdbackCeiling
        ? (dailyDebit - holdbackCeiling) / holdbackCeiling : 0;
      if (leverageOver > 0) vitalsRisk += Math.min(30, Math.round(leverageOver * 100 * 5));
      if (overPull > 0)     vitalsRisk += Math.min(20, 12 + Math.round(overPull * 8));
    }
    // Chain (Alexander): same per-turn-cards-played multiplier the preview shows
    if (selectedUnderwriter === 'alexander' && cardsPlayedThisTurn >= 3) {
      vitalsRisk += (cardsPlayedThisTurn - 2) * -3;
    }
    // Hedge (Branden): bonus for hybrid mods (both risk-trim AND factor adjustment)
    if (selectedUnderwriter === 'branden') {
      const hedgeCount = activeMods.filter((m) => m.risk && m.risk < 0 && m.factor).length;
      if (hedgeCount > 0) vitalsRisk += hedgeCount * -3;
    }

    // HP penalty: if the file isn't fully vetted (hp > 0), funding it blind costs you risk.
    // Roughly: +25 risk at full HP, scaling linearly to 0 at HP=0. Boss files hit harder (max +35).
    const hpPenalty = boss.maxHp ? (boss.hp / boss.maxHp) * (boss.isBoss ? 35 : 25) : 0;

    // === Risk-as-Damage resolution (StS Block model) ===
    // Pure deterministic: final risk = every visible/hidden source. No volatility shock.
    // Risk above the file's threshold becomes Capital damage, scaled by advance.
    // Profit is *always paid* (modulated by tier) — you can clear a file for a profit AND
    // take damage on the same submit. The deck/term-sheet decisions ARE the mitigation.
    const finalRisk = Math.max(0, Math.min(120,
      boss.actualBaseRisk + cardRisk + sliderRisk + relicRisk + vitalsRisk + hpPenalty
    ));
    const threshold = boss.riskThreshold || 35;
    const riskOver = Math.max(0, finalRisk - threshold);

    const payback = Math.floor(advance * finalFactor);
    const idealProfit = payback - advance;

    // Profit ladder by how far over the threshold the read landed
    let profitMult, bandName, bandTone, isCleared;
    if (riskOver === 0)        { profitMult = 1.10; bandName = 'Clean Clear'; bandTone = 'emerald'; isCleared = true; }
    else if (riskOver <= 15)   { profitMult = 1.00; bandName = 'Cleared';     bandTone = 'emerald'; isCleared = true; }
    else if (riskOver <= 30)   { profitMult = 0.65; bandName = 'Stressed';    bandTone = 'amber';   isCleared = true; }
    else if (riskOver <= 50)   { profitMult = 0.30; bandName = 'Breach';      bandTone = 'red';     isCleared = false; }
    else                       { profitMult = 0;    bandName = 'Default';     bandTone = 'red';     isCleared = false; }

    // Damage = (riskOver / 100) × advance, capped at advance. Premium Security soaks 25%.
    let damage = Math.min(advance, Math.floor((riskOver / 100) * advance));
    const securityRelic = relics.includes('r_security') && damage > 0;
    const damageReducedBy = securityRelic ? Math.floor(damage * 0.25) : 0;
    damage = damage - damageReducedBy;

    let profit = Math.floor(idealProfit * profitMult);
    // Yield (Isaac): glass cannon — +15% profit on cleared files, but +25% damage taken on hits.
    const isYield = selectedUnderwriter === 'isaac';
    if (isYield && profit > 0) profit = Math.floor(profit * 1.15);
    if (isYield && damage > 0) damage = Math.floor(damage * 1.25);
    const net = profit - damage;
    const summary = `${formatMoney(advance)} @ ${finalFactor.toFixed(2)}× / ${offerParams.termDays}d / ${Math.round(offerParams.holdbackPct * 100)}% holdback`;
    const msg = riskOver === 0
      ? `Clean read. Booked ${formatMoney(profit)} with no Capital damage.`
      : `Risk ${Math.round(finalRisk)} vs Threshold ${threshold} (${riskOver} over). Booked ${formatMoney(profit)} profit, took ${formatMoney(damage)} Capital damage${damageReducedBy ? ` (Premium Security saved ${formatMoney(damageReducedBy)})` : ''}.`;

    if (isCleared) setRunStats((s) => ({ ...s, cleared: s.cleared + 1 }));
    else           setRunStats((s) => ({ ...s, defaulted: s.defaulted + 1 }));

    setLastOutcome({
      type: bandName.toUpperCase().replace(/ /g, '_'),
      bandName,
      bandTone,
      profit: net,
      grossProfit: profit,
      damage,
      threshold,
      riskOver,
      riskScore: Math.round(finalRisk),
      summary,
      advance,
      msg,
      success: isCleared,
    });
    // (Fix F2) Cleared-deal snapshot now captures the original term-sheet levers and the day
    // it cleared, so generateRenewalBoss can build a real callback when this merchant returns.
    const dealSnapshot = isCleared ? {
      ...boss,
      lastFactor: finalFactor,
      lastAdvance: advance,
      dayCleared: day,
      originalAdvancePct: offerParams.advancePct,
      originalTermDays: offerParams.termDays,
      originalHoldbackPct: offerParams.holdbackPct,
      profitBooked: profit,
    } : null;

    // === Build the RESOLUTION_REVEAL queue (Fix F1) =====================================
    // Retires symptoms 2 (no submit drama), 3 (no card-play juice on resolution), 18 (post-
    // resolution screen as static spreadsheet). The cascade narrates contributions in order;
    // the meter sweep + band lock land in Phase 4. Side-effects (capital/commission/runStats)
    // are stashed in pendingDelta and applied when the reveal completes — the HUD's fund
    // display doesn't change until the player has watched the math arrive.
    const breakdown = evaluateModsBreakdown(activeMods, ctx);
    const cardEvents = breakdown
      .filter((b) => Math.abs(b.risk) > 0.5 || Math.abs(b.factor) > 0.005)
      .map((b) => ({
        type: 'card',
        duration: breakdown.length > 6 ? 125 : 250,
        payload: { name: b.name, risk: b.risk, factor: b.factor },
      }));
    const anomalyList = (boss.anomalies || []).map((aId) => {
      const a = ANOMALY_TYPES[aId];
      if (!a) return null;
      return {
        type: 'anomaly',
        duration: (boss.anomalies.length > 4) ? 175 : 300,
        payload: {
          id: aId,
          label: a.label,
          risk: a.risk,
          wasHidden: !boss.anomaliesRevealed,
        },
      };
    }).filter(Boolean);

    const queue = [
      // Phase 1 — term sheet locks. Instant visual; meter shows zero, baseline contribution
      // appears as a single non-card "Term Sheet" event that anchors the cascade.
      {
        type: 'lock',
        duration: 500,
        payload: { sliderRisk: Math.round(sliderRisk + relicRisk + vitalsRisk + hpPenalty) },
      },
      // Phase 2 — per-card cascade. Empty queue collapses to no entries (auto-decline path).
      ...cardEvents,
      // Phase 3 — anomaly surface. Hidden anomalies flash red (the gotchas the player missed).
      ...anomalyList,
      // Phase 4 — outcome land. Meter sweeps to finalRisk, band lock-in fires screen flash.
      {
        type: 'land',
        duration: 1200,
        payload: {
          finalRisk: Math.round(finalRisk),
          threshold,
          bandName,
          bandTone,
          profit,
          damage,
          net,
          isCleared,
        },
      },
    ];

    // Stash side-effects until reveal completes
    setPendingDelta(net);
    setPendingClearedDeal(dealSnapshot);
    // Run-stats also stashed — applied in finalizeReveal below
    if (isCleared) setRunStats((s) => ({ ...s, cleared: s.cleared + 1 }));
    else           setRunStats((s) => ({ ...s, defaulted: s.defaulted + 1 }));

    // Reset reveal state and arm the queue
    setRevealQueue(queue);
    setRevealStep(0);
    setRevealDone(false);
    setRevealSkipped(false);
    setRevealRiskNow(0);
    setRevealFlashTrigger(0);
    setGameState('RESOLUTION_REVEAL');
  };

  // === Finalize reveal (Fix F1) =======================================================
  // Called when the queue completes naturally OR when the player clicks to skip. Applies
  // the deferred capital/commission/cleared-deal updates and transitions to the existing
  // RESOLUTION screen for the calm aftermath.
  const finalizeReveal = () => {
    // endEncounter applies capital + commission + cleared-deal-record + clears hand/piles
    endEncounter(pendingDelta, pendingClearedDeal);
    // No need to clear pending* — executeOffer overwrites them on next submit
  };

  // === Encounter resolution ===
  const endEncounter = (delta, clearedDeal) => {
    setCapital((c) => c + delta);
    if (delta > 0) {
      const commissionRate = relics.includes('r_bourbon') ? 0.125 : 0.10;
      const kickbackMult = selectedUnderwriter === 'stanley' ? 1.5 : 1;
      setCommission((c) => c + Math.floor(delta * commissionRate * kickbackMult));
    }
    if (clearedDeal) {
      setLastClearedDeal(clearedDeal);
      setClearedDeals((d) => [...d, clearedDeal]);
    }
    setActiveMods([]);
    setHand([]);
    setDrawPile([]);
    setDiscardPile([]);
    setGameState('RESOLUTION');
  };

  const proceedFromResolution = () => {
    if (capital <= 0) {
      setGameState('GAMEOVER');
      return;
    }
    if (lastOutcome?.type === 'DECLINE' || lastOutcome?.blocked) {
      // Skip draft on declines
      advanceDay();
      return;
    }
    // Tier-aware draft: boss/scam clears bump draft size and guarantee at least one rare card;
    // the final boss bumps further. Scam clears also pay a $500 commission bonus on top of profit.
    const cleared = lastOutcome?.success;
    const wasFinal = boss?.isFinalBoss;
    const wasBoss  = boss?.isBoss;   // covers regular bosses, renewal-bosses, and scam files
    const wasScam  = boss?.isScam;
    if (cleared && wasScam) {
      const scamBonus = selectedUnderwriter === 'stanley' ? 750 : 500; // Kickback (+50%)
      setCommission((c) => c + scamBonus);
    }

    let draftSize = 3;
    let rareGuarantees = 0;
    if (cleared && wasBoss) { draftSize = 4; rareGuarantees = 1; }
    if (cleared && wasFinal) { draftSize = 5; rareGuarantees = 2; }

    const uw = UNDERWRITERS.find((u) => u.id === selectedUnderwriter);
    const draftSource = uw ? uw.pool : CARD_POOL;
    const rares = draftSource.filter((c) => getCardTier(c) === 'rare');
    const nonRare = draftSource.filter((c) => getCardTier(c) !== 'rare');

    let chosen = [];
    // Pull guaranteed rares first (no duplicates)
    const rarePool = shuffle(rares);
    for (let i = 0; i < rareGuarantees && rarePool.length; i++) chosen.push(rarePool.shift());
    // Fill remainder from the full pool (excluding already-chosen ids)
    const fillPool = shuffle([...rarePool, ...nonRare]).filter((c) => !chosen.find((x) => x.id === c.id));
    while (chosen.length < draftSize && fillPool.length) chosen.push(fillPool.shift());

    const choices = chosen.map((c, i) => ({ ...c, uid: c.id + '_d' + Date.now() + '_' + i }));
    setDraftChoices(choices);
    setGameState('DRAFT');
  };

  const draftCard = (card) => {
    if (card) setDeck((d) => [...d, card]);
    advanceDay();
  };

  const advanceDay = () => {
    if (day >= PROMOTION_DAY) {
      setGameState('GAMEOVER');
      return;
    }
    setDay((d) => d + 1);
    setGameState('INTERMISSION');
  };

  // === Broker Row (ISO Shop) ===
  const generateShop = () => {
    const ownedRelicIds = new Set(relics);
    const availableRelics = RELIC_POOL.filter((r) => !ownedRelicIds.has(r.id));
    setShopRelics(shuffle(availableRelics).slice(0, 3));
    setShopConsumables(shuffle(CONSUMABLE_POOL).slice(0, 2));
    setShopkeeper(ISO_ROSTER[Math.floor(Math.random() * ISO_ROSTER.length)]);
    setRefreshUsed(0);
    setGameState('SHOP');
  };

  const refreshShop = () => {
    const cost = refreshCost(day) + refreshUsed * 25;
    if (commission < cost) return;
    setCommission((c) => c - cost);
    setRefreshUsed((r) => r + 1);
    const ownedRelicIds = new Set(relics);
    const availableRelics = RELIC_POOL.filter((r) => !ownedRelicIds.has(r.id));
    setShopRelics(shuffle(availableRelics).slice(0, 3));
    setShopConsumables(shuffle(CONSUMABLE_POOL).slice(0, 2));
    // Walking to a new floor means a new ISO at the desk — pick fresh, but never repeat the same one twice in a row.
    setShopkeeper((prev) => {
      const pool = ISO_ROSTER.filter((k) => !prev || k.name !== prev.name);
      return pool[Math.floor(Math.random() * pool.length)];
    });
  };

  const buyRelic = (relic) => {
    const cost = Math.floor(relic.cost * priceMultiplier(day));
    if (commission < cost || relics.includes(relic.id)) return;
    setCommission((c) => c - cost);
    setRelics((r) => [...r, relic.id]);
    setShopRelics((s) => s.filter((x) => x.id !== relic.id));
  };

  const buyConsumable = (cons) => {
    const cost = Math.floor(cons.cost * priceMultiplier(day));
    if (commission < cost) return;
    setCommission((c) => c - cost);
    setConsumables((cs) => [...cs, cons]);
    setShopConsumables((s) => s.filter((x) => x !== cons));
  };

  const queueConsumable = (cons, idx) => {
    setPendingConsumables((p) => [...p, cons]);
    setConsumables((cs) => cs.filter((_, i) => i !== idx));
  };

  const removeFromDeck = (uid) => {
    const cost = removalCost(day);
    if (commission < cost || deck.length <= 3) return;
    setCommission((c) => c - cost);
    setDeck((d) => d.filter((c) => c.uid !== uid));
  };

  // === Visible-risk computation for HUD ===
  // Returns { total, parts } so the term sheet can show a breakdown of where each visible point comes from.
  const baseRiskInfo = useMemo(() => {
    if (!boss) return { total: 0, parts: [] };
    const parts = [
      { label: `${boss.industry.name} base`, value: boss.industry.baseRisk },
    ];
    const dd = dayDifficulty(day);
    if (dd) parts.push({ label: `Day ${day} difficulty`, value: dd });
    if (boss.state.riskMod) parts.push({ label: `State (${boss.state.code})`, value: boss.state.riskMod });
    if (relics.includes('r_iso_book') && boss.iso.riskMod) {
      parts.push({ label: `ISO tier (${boss.iso.tier})`, value: boss.iso.riskMod });
    }
    if (boss.hidden.fico.revealed) {
      parts.push({ label: `FICO ${boss.hidden.fico.label}`, value: boss.hidden.fico.risk });
    }
    if (boss.hidden.tib.revealed) {
      parts.push({ label: `TIB ${boss.hidden.tib.label}`, value: boss.hidden.tib.risk });
    }
    if (boss.hidden.position.revealed) {
      parts.push({ label: `Position ${boss.hidden.position.label}`, value: boss.hidden.position.risk });
    }
    if (boss.hidden.bank.revealed) {
      parts.push({ label: `Bank stmts (NSFs/ADB)`, value: boss.hidden.bank.risk });
    }
    if (boss.anomaliesRevealed) {
      (boss.anomalies || []).forEach((a) => {
        parts.push({ label: `Anomaly: ${ANOMALY_TYPES[a].label}`, value: ANOMALY_TYPES[a].risk });
      });
    } else if (relics.includes('r_forensic') && boss.hidden.bank.revealed && boss.anomalies?.length) {
      parts.push({ label: `Top anomaly (Forensic Eye): ${ANOMALY_TYPES[boss.anomalies[0]].label}`, value: ANOMALY_TYPES[boss.anomalies[0]].risk });
    }
    if (boss.isRenewal) parts.push({ label: 'Renewal track-record', value: -20 });
    if (boss.cleanFileApplied) parts.push({ label: `Clean File buff (Walk)`, value: -boss.cleanFileApplied });
    // Forensic (Brendan): -2 visible Risk for every anomaly the player can see
    if (selectedUnderwriter === 'brendan') {
      const visibleAnoms = boss.anomaliesRevealed
        ? (boss.anomalies || []).length
        : (relics.includes('r_forensic') && boss.hidden.bank.revealed && boss.anomalies?.length ? 1 : 0);
      if (visibleAnoms > 0) parts.push({ label: `Forensic keyword (−2 / anomaly × ${visibleAnoms})`, value: -2 * visibleAnoms });
    }
    const total = parts.reduce((s, p) => s + p.value, 0);
    return { total, parts };
  }, [boss, relics, day, selectedUnderwriter]);
  const baseRiskAccrued = baseRiskInfo.total;

  const revealedCount = boss
    ? Object.values(boss.hidden).filter((h) => h.revealed).length
    : 0;
  const totalAttrs = 4;

  // === Start screen background image presence detection ===
  // The cinematic background is optional — the screen still reads correctly without it.
  // Probes assets/start-screen.png; flips state once we know whether to dim the HTML
  // title (so it doesn't double up with the image's baked-in title) and hide the hint.
  const [bgImgLoaded, setBgImgLoaded] = useState(null); // null = unknown, true/false once probed
  useEffect(() => {
    if (gameState !== 'MENU') return;
    const img = new Image();
    img.onload  = () => setBgImgLoaded(true);
    img.onerror = () => setBgImgLoaded(false);
    img.src = 'assets/Start.png?probe=' + Date.now(); // bypass cache so a save mid-session is detected
  }, [gameState]);

  // === Audio: init element once, wire error/play/pause listeners so UI shows what's happening ===
  useEffect(() => {
    const audio = new Audio();
    audio.loop = true;
    audio.preload = 'auto';
    audio.volume = audioMuted ? 0 : audioVolume;
    const onPlay  = () => { setAudioStatus('playing'); setAudioErrorMsg(''); };
    const onPause = () => setAudioStatus((s) => (s === 'playing' ? 'idle' : s));
    const onErr   = () => {
      const err = audio.error;
      const codeMap = { 1: 'aborted', 2: 'network', 3: 'decode', 4: 'src not supported (likely 404 or bad path)' };
      const codeMsg = err ? (codeMap[err.code] || ('code ' + err.code)) : 'unknown';
      // Some preview iframes block audio's range-request fetch but allow plain fetch().
      // Try fetching the same path as a blob and re-pointing the audio element at the blob URL.
      const failedSrc = audio.src;
      fetch(failedSrc).then((r) => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.blob();
      }).then((blob) => {
        const blobUrl = URL.createObjectURL(blob);
        audio.src = blobUrl;
        return audio.play().then(() => {
          setAudioStatus('playing');
          setAudioErrorMsg('recovered via blob fallback');
        });
      }).catch((fetchErr) => {
        setAudioStatus('error');
        setAudioErrorMsg(codeMsg + ' | fetch: ' + (fetchErr.message || fetchErr) + ' | src=' + failedSrc);
      });
    };
    const onWait  = () => setAudioStatus('loading');
    audio.addEventListener('play', onPlay);
    audio.addEventListener('pause', onPause);
    audio.addEventListener('error', onErr);
    audio.addEventListener('waiting', onWait);
    audioRef.current = audio;
    return () => {
      audio.removeEventListener('play', onPlay);
      audio.removeEventListener('pause', onPause);
      audio.removeEventListener('error', onErr);
      audio.removeEventListener('waiting', onWait);
      audio.pause(); audio.src = ''; audioRef.current = null;
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // === RESOLUTION_REVEAL driver effect (Fix F1) =====================================
  // Walks revealQueue via chained setTimeouts. Each event advances revealStep, which the
  // RESOLUTION_REVEAL JSX reads to render the cascade overlay + meter sweep + flash.
  // Skip latch: revealSkipped → jump immediately to the land event's settled state.
  // Cleanup: cancels timeouts on gameState change (so leaving the screen doesn't fire stale
  // updates).
  useEffect(() => {
    if (gameState !== 'RESOLUTION_REVEAL') return;
    if (!revealQueue.length) return;
    if (revealDone) return;

    const timeouts = [];
    let cumulative = 0;

    const advance = (toStep) => {
      const ev = revealQueue[toStep];
      if (!ev) return;
      setRevealStep(toStep);
      // On 'land' event: trigger the meter sweep + screen flash + stinger + finalize side-effects.
      if (ev.type === 'land') {
        setRevealRiskNow(ev.payload.finalRisk);
        setRevealFlashTrigger((n) => n + 1);
        playStinger(ev.payload.bandName);
      }
    };

    if (revealSkipped) {
      // Skip latch — jump straight to the land event's settled state. Player still has to
      // tap once more to advance to RESOLUTION (so they read the band name before moving on).
      const landIdx = revealQueue.findIndex((e) => e.type === 'land');
      const landEvent = revealQueue[landIdx];
      if (landEvent) {
        // Use a single timeout so React batches the state updates cleanly.
        timeouts.push(setTimeout(() => {
          setRevealStep(landIdx);
          setRevealRiskNow(landEvent.payload.finalRisk);
          setRevealFlashTrigger((n) => n + 1);
          playStinger(landEvent.payload.bandName);
          setRevealDone(true);
        }, 0));
      } else {
        setRevealDone(true);
      }
    } else {
      // Walk the queue with cumulative timeouts.
      revealQueue.forEach((ev, idx) => {
        timeouts.push(setTimeout(() => advance(idx), cumulative));
        cumulative += ev.duration;
      });
      // After the final event's duration, mark done. Player taps to advance to RESOLUTION;
      // finalizeReveal fires from the click handler. This pause gives the band landing
      // time to register before the screen changes — Slay-the-Spire's per-encounter end-card.
      timeouts.push(setTimeout(() => {
        setRevealDone(true);
      }, cumulative + 50));
    }

    return () => {
      timeouts.forEach((t) => clearTimeout(t));
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [gameState, revealQueue, revealSkipped]);

  // Track-switch effect — keyed on gameState AND boss.bgMusic so a new boss with a different
  // theme triggers a switch. Same-track re-renders are silent (no restart).
  useEffect(() => {
    const audio = audioRef.current;
    if (!audio) return;
    const track = trackForGameState(gameState, boss);
    if (!track) { audio.pause(); return; }
    if (currentTrackRef.current !== track) {
      audio.src = track;
      audio.currentTime = 0;
      currentTrackRef.current = track;
    }
    audio.play().catch(() => {});
  }, [gameState, boss?.bgMusic]);

  useEffect(() => {
    if (audioRef.current) audioRef.current.volume = audioMuted ? 0 : audioVolume;
    try {
      localStorage.setItem('uw_audio_muted', audioMuted ? '1' : '0');
      localStorage.setItem('uw_audio_vol', String(audioVolume));
    } catch (e) { /* private mode etc. */ }
  }, [audioMuted, audioVolume]);

  // Browsers block audio autoplay until first user gesture. Retry play() on EVERY click/key until
  // play() actually resolves (the listener removes itself on success). `once: true` was wrong here —
  // if the very first click fires before the listener attached (race), the listener vanishes with
  // nothing playing and the page goes silent forever.
  useEffect(() => {
    let removed = false;
    const tryUnlock = () => {
      const audio = audioRef.current;
      if (!audio || audioMuted) return;
      const track = trackForGameState(gameState, boss);
      if (!track) return;
      audio.play().then(() => {
        if (removed) return;
        removed = true;
        document.removeEventListener('click', tryUnlock);
        document.removeEventListener('keydown', tryUnlock);
        document.removeEventListener('touchstart', tryUnlock);
      }).catch(() => { /* still blocked, keep listening */ });
    };
    const evts = ['pointerdown', 'mousedown', 'click', 'keydown', 'touchstart'];
    evts.forEach((e) => document.addEventListener(e, tryUnlock));
    return () => {
      removed = true;
      evts.forEach((e) => document.removeEventListener(e, tryUnlock));
    };

  // === Animated rain on the start screen ===

  useEffect(() => {
    if (gameState !== 'MENU') return;
    const canvas = document.querySelector('.start-rain');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;
    const drops = [];
    const init = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
      drops.length = 0;
      const count = Math.min(280, Math.floor((canvas.width * canvas.height) / 5500));
      for (let i = 0; i < count; i++) {
        drops.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          len: 8 + Math.random() * 14,
          speed: 7 + Math.random() * 8,
          opacity: 0.18 + Math.random() * 0.32,
          tint: Math.random() < 0.18 ? 'rgba(180,140,255,' : Math.random() < 0.5 ? 'rgba(140,200,255,' : 'rgba(200,220,255,',
        });
      }
    };
    init();
    const onResize = () => init();
    window.addEventListener('resize', onResize);

    const tick = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const d of drops) {
        ctx.strokeStyle = d.tint + d.opacity + ')';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - 2, d.y + d.len);
        ctx.stroke();
        d.y += d.speed;
        if (d.y > canvas.height) {
          d.y = -d.len;
          d.x = Math.random() * canvas.width;
        }
      }
      raf = requestAnimationFrame(tick);
    };
    tick();
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', onResize);
    };
  }, [gameState]);
